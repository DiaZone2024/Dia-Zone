<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Dia Zone - PUBG UC</title>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0b0c1a 0%, #11132a 100%);
      font-family: 'Inter', 'Poppins', 'Myanmar Text', sans-serif;
      min-height: 100vh;
      padding-bottom: 85px;
      background-image: url('image/pubg.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .container {
      max-width: 550px;
      margin: 0 auto;
      background: rgba(18, 22, 48, 0.75);
      backdrop-filter: blur(12px);
      min-height: 100vh;
      border-radius: 2rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      margin-top: 1rem;
      margin-bottom: 1rem;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, rgba(30, 35, 72, 0.9), rgba(12, 15, 36, 0.9));
      padding: 1rem 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #ffd966;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo h1 {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(120deg, #FFF8E7, #FFE6A3);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .back-btn {
      background: rgba(255, 215, 0, 0.15);
      border: 1px solid rgba(255, 215, 0, 0.3);
      color: #FFE6A3;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: rgba(255, 215, 0, 0.25);
      transform: translateX(-3px);
    }

    .title-section {
      padding: 1.5rem 1.2rem 0.5rem;
    }

    .title-section h2 {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(120deg, #FFF8E7, #FFE6A3);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .title-section h2 i {
      color: #FFC857;
      margin-right: 8px;
    }

    /* Tab Buttons */
    .tab-buttons {
      display: flex;
      gap: 1rem;
      padding: 0.8rem 1.2rem;
      margin-top: 0.5rem;
    }

    .tab-btn {
      flex: 1;
      padding: 0.7rem;
      border-radius: 2rem;
      border: 1px solid rgba(255, 215, 0, 0.3);
      font-weight: 700;
      cursor: pointer;
      background: rgba(10, 12, 28, 0.7);
      color: #a3abdf;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: linear-gradient(95deg, #FFC857, #FFAE2B);
      color: #12142e;
      border: none;
    }

    /* Product Grid */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.8rem;
      padding: 0.8rem 1.2rem;
    }

    .product-card {
      position: relative;
      background: rgba(10, 12, 28, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 1rem;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      border: 1px solid rgba(255, 215, 0, 0.2);
      transition: all 0.2s;
      overflow: hidden;
    }

    /* UC Product Card Background */
    .uc-card {
      background-image: url('image/UC.jpg');
      background-size: cover;
      background-position: center;
    }

    /* Code Product Card Background */
    .code-card {
      background-image: url('image/code.jpg');
      background-size: cover;
      background-position: center;
    }

    .product-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 0;
      border-radius: 1rem;
    }

    .product-card > * {
      position: relative;
      z-index: 1;
    }

    .product-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      border-color: rgba(255, 215, 0, 0.5);
    }

    .product-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(145deg, #FFC857, #FFAE2B);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 0.5rem;
    }

    .product-icon i {
      font-size: 1.5rem;
      color: #12142e;
    }

    .product-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: #FFE6A3;
    }

    .price-row {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.3rem;
    }

    .current-price {
      font-size: 0.9rem;
      font-weight: 700;
      color: #FFC857;
    }

    .buy-btn {
      background: linear-gradient(95deg, #FFC857, #FFAE2B);
      color: #12142e;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      width: 100%;
      transition: all 0.2s;
    }

    .buy-btn:hover {
      transform: scale(0.98);
      background: linear-gradient(95deg, #FFD46E, #FFB83B);
    }

    .footer-links {
      padding: 1rem 1.2rem;
      text-align: center;
      border-top: 1px solid rgba(255, 215, 0, 0.1);
      margin-top: 1rem;
    }

    .footer-links a {
      color: #9ba3e0;
      text-decoration: none;
      font-size: 0.7rem;
      margin: 0 0.5rem;
    }

    .footer-links span {
      color: #4c5290;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10, 12, 28, 0.95);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0.6rem 1rem;
      border-top: 1px solid rgba(255, 215, 0, 0.2);
      max-width: 550px;
      margin: 0 auto;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 1.2rem;
      transition: all 0.2s;
      font-family: inherit;
    }

    .nav-icon {
      font-size: 1.4rem;
    }

    .nav-label {
      font-size: 0.7rem;
      font-weight: 500;
      color: #a3abdf;
      letter-spacing: 0.3px;
    }

    .nav-item.active .nav-label {
      color: #FFD966;
      font-weight: 600;
    }

    .nav-item.active .nav-icon {
      color: #FFD966;
    }

    .nav-item:hover {
      background: rgba(255, 215, 0, 0.08);
      transform: translateY(-2px);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: #1a1e3a;
      border-radius: 1.5rem;
      padding: 1.5rem;
      width: 90%;
      max-width: 400px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-content h3 {
      font-size: 1.3rem;
      margin-bottom: 1rem;
      color: #FFE6A3;
      text-align: center;
    }

    .modal-content h3 i {
      color: #FFC857;
      margin-right: 8px;
    }

    #modalProductInfo {
      margin-bottom: 1rem;
      font-weight: 700;
      color: #FFC857;
      text-align: center;
      padding: 0.5rem;
      background: rgba(255, 215, 0, 0.1);
      border-radius: 0.8rem;
    }

    .modal-content input {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1rem;
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 0.8rem;
      background: #0f122e;
      color: white;
    }

    .modal-content input:focus {
      outline: none;
      border-color: #FFC857;
    }

    .modal-content input::placeholder {
      color: #6c72a5;
    }

    .modal-buttons {
      display: flex;
      gap: 0.8rem;
      margin-top: 0.5rem;
    }

    .modal-buttons button {
      flex: 1;
      padding: 0.8rem;
      border-radius: 2rem;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }

    .order-now-btn {
      background: linear-gradient(95deg, #FFC857, #FFAE2B);
      color: #12142e;
    }

    .cancel-order-btn {
      background: rgba(255, 255, 255, 0.1);
      color: #b9c3ff;
    }

    .error-msg {
      color: #ff6b6b;
      font-size: 0.75rem;
      display: none;
      margin-bottom: 0.8rem;
      text-align: center;
    }

    .error-msg.show {
      display: block;
    }

    .processing-toast, .success-toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      z-index: 1000;
      display: none;
    }

    .processing-toast {
      background: #f59e0b;
    }

    .success-toast {
      background: #10b981;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> နောက်သို့</button>
    <div class="logo"><h1>Dia Zone</h1></div>
    <div style="width:60px;"></div>
  </div>

  <div class="title-section">
    <h2><i class="fas fa-gamepad"></i> PUBG UC</h2>
  </div>

  <div class="tab-buttons">
    <button class="tab-btn active" id="ucTopupTab">💰 UC Top Up</button>
    <button class="tab-btn" id="codeTab">🎫 Code Price</button>
  </div>

  <div id="ucTopupSection">
    <div class="product-grid" id="ucProductGrid"></div>
  </div>
  <div id="codeSection" style="display:none;">
    <div class="product-grid" id="codeProductGrid"></div>
  </div>

  <div class="footer-links">
    <a href="#">Privacy Policy</a><span>|</span><a href="#">Terms & Conditions</a>
  </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <button class="nav-item" data-page="home">
    <div class="nav-icon">🏠</div>
    <div class="nav-label">ပင်မစာမျက်နှာ</div>
  </button>
  <button class="nav-item" data-page="games">
    <div class="nav-icon">🎮</div>
    <div class="nav-label">ဂိမ်းစာမျက်နှာ</div>
  </button>
  <button class="nav-item" data-page="wallet">
    <div class="nav-icon">👛</div>
    <div class="nav-label">ပိုက်ဆံအိတ်</div>
  </button>
  <button class="nav-item" data-page="orders">
    <div class="nav-icon">📦</div>
    <div class="nav-label">မှတ်တမ်းများ</div>
  </button>
  <button class="nav-item" data-page="profile">
    <div class="nav-icon">👤</div>
    <div class="nav-label">ပရိုဖိုင်</div>
  </button>
</div>

<!-- Order Modal -->
<div id="orderModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-gamepad"></i> အော်ဒါအပြီးသတ်ရန်</h3>
    <div id="modalProductInfo" style="margin-bottom: 1rem; font-weight: 600;"></div>
    <input type="text" id="pubgId" placeholder="PUBG ID / Character ID">
    <input type="text" id="ignName" placeholder="ဂိမ်းထဲကနာမည်">
    <div id="modalError" class="error-msg"></div>
    <div class="modal-buttons">
      <button class="cancel-order-btn" id="cancelOrderBtn">မလုပ်တော့ပါ</button>
      <button class="order-now-btn" id="confirmOrderBtn">အော်ဒါယူမည်</button>
    </div>
  </div>
</div>

<div id="processingToast" class="processing-toast"><i class="fas fa-spinner fa-pulse"></i> လုပ်ဆောင်နေသည်... စောင့်ပါ</div>
<div id="successToast" class="success-toast"><i class="fas fa-check-circle"></i> အော်ဒါအောင်မြင်ပါသည်</div>

<script>
  // Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyCZridqu0bhTRM5mzbRdfJxWic4xcG7rg4",
  authDomain: "dia-zone.firebaseapp.com",
  databaseURL: "https://dia-zone-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dia-zone",
  storageBucket: "dia-zone.firebasestorage.app",
  messagingSenderId: "954378673786",
  appId: "1:954378673786:web:fe6ab648f60eb5207665c3"
};

  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const db = firebase.database();

  // Default PUBG Prices
  const DEFAULT_PUBG_PRICES = {
    uc: [
      { name: "60 UC", price: 4190 },
      { name: "180 UC", price: 12730 },
      { name: "325 UC", price: 20900 },
      { name: "445 UC", price: 29500 },
      { name: "1320 UC", price: 82600 },
      { name: "1800 UC", price: 107500 },
      { name: "2785 UC", price: 171100 },
      { name: "3850 UC", price: 208000 },
      { name: "5650 UC", price: 316500 },
      { name: "8100 UC", price: 411000 }
    ],
    code: [
      { name: "60 UC Code", price: 4190 },
      { name: "180 UC Code", price: 12730 },
      { name: "325 UC Code", price: 20900 },
      { name: "445 UC Code", price: 29500 },
      { name: "1320 UC Code", price: 82600 },
      { name: "1800 UC Code", price: 107500 },
      { name: "2785 UC Code", price: 171100 },
      { name: "3850 UC Code", price: 208000 },
      { name: "5650 UC Code", price: 316500 },
      { name: "8100 UC Code", price: 411000 }
    ]
  };

  let currentUser = null;
  let selectedProduct = null;
  let pubgPrices = null;
  let userId = null;

  function formatNumber(num) { return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }

  function renderProducts() {
    const prices = pubgPrices || DEFAULT_PUBG_PRICES;
    
    const ucGrid = document.getElementById('ucProductGrid');
    if (ucGrid) {
      ucGrid.innerHTML = '';
      if (prices.uc && prices.uc.length > 0) {
        prices.uc.forEach(item => {
          const card = document.createElement('div'); 
          card.className = 'product-card uc-card';
          card.innerHTML = `
            <div class="product-icon"><i class="fas fa-coins"></i></div>
            <div class="product-name">${item.name}</div>
            <div class="price-row"><span class="current-price">${formatNumber(item.price)} Ks</span></div>
            <button class="buy-btn">ဝယ်ယူမည်</button>
          `;
          card.onclick = (e) => {
            if (e.target.classList.contains('buy-btn')) e.stopPropagation();
            openOrderModal(item, 'UC Top Up');
          };
          ucGrid.appendChild(card);
        });
      }
    }

    const codeGrid = document.getElementById('codeProductGrid');
    if (codeGrid) {
      codeGrid.innerHTML = '';
      if (prices.code && prices.code.length > 0) {
        prices.code.forEach(item => {
          const card = document.createElement('div'); 
          card.className = 'product-card code-card';
          card.innerHTML = `
            <div class="product-icon"><i class="fas fa-ticket-alt"></i></div>
            <div class="product-name">${item.name}</div>
            <div class="price-row"><span class="current-price">${formatNumber(item.price)} Ks</span></div>
            <button class="buy-btn">ဝယ်ယူမည်</button>
          `;
          card.onclick = (e) => {
            if (e.target.classList.contains('buy-btn')) e.stopPropagation();
            openOrderModal(item, 'UC Code');
          };
          codeGrid.appendChild(card);
        });
      }
    }
  }

  // Firebase Price Listener
  db.ref('prices/pubg').on('value', (snapshot) => {
    if (snapshot.exists()) {
      pubgPrices = snapshot.val();
    } else {
      pubgPrices = DEFAULT_PUBG_PRICES;
      db.ref('prices/pubg').set(DEFAULT_PUBG_PRICES);
    }
    renderProducts();
  });

  // User Check
  currentUser = JSON.parse(localStorage.getItem('diaZoneUser') || sessionStorage.getItem('diaZoneUser') || 'null');
  if (!currentUser) {
    window.location.href = 'login.html';
  } else {
    userId = currentUser.id || currentUser.userId;
    if (userId) {
      db.ref('users/' + userId).on('value', (snapshot) => {
        if (snapshot.exists()) {
          const data = snapshot.val();
          currentUser = { ...currentUser, ...data, id: userId };
          localStorage.setItem('diaZoneUser', JSON.stringify(currentUser));
          sessionStorage.setItem('diaZoneUser', JSON.stringify(currentUser));
        }
      });
    }
  }

  function openOrderModal(product, type) {
    if (!currentUser) { 
      window.location.href = 'login.html'; 
      return; 
    }
    selectedProduct = { ...product, type: type };
    document.getElementById('modalProductInfo').innerHTML = `<i class="fas fa-coins"></i> ${product.name} (${type})<br><strong>${formatNumber(product.price)} Ks</strong>`;
    document.getElementById('pubgId').value = '';
    document.getElementById('ignName').value = '';
    document.getElementById('modalError').classList.remove('show');
    document.getElementById('orderModal').classList.add('show');
  }

  function closeOrderModal() {
    document.getElementById('orderModal').classList.remove('show');
  }

  function generateOrderId() {
    return 'PUBG-' + Date.now().toString() + '-' + Math.random().toString(36).substr(2, 6).toUpperCase();
  }

  async function placeOrder() {
    const pubgId = document.getElementById('pubgId').value.trim();
    const ignName = document.getElementById('ignName').value.trim();
    const errorDiv = document.getElementById('modalError');

    if (!pubgId) {
      errorDiv.textContent = 'PUBG ID / Character ID ထည့်ပါ';
      errorDiv.classList.add('show');
      return;
    }
    if (!ignName) {
      errorDiv.textContent = 'ဂိမ်းထဲကနာမည် ထည့်ပါ';
      errorDiv.classList.add('show');
      return;
    }

    if (currentUser.balance < selectedProduct.price) {
      errorDiv.textContent = 'လက်ကျန်ငွေ မလုံလောက်ပါ။ ငွေဖြည့်ပါ';
      errorDiv.classList.add('show');
      return;
    }

    const confirmBtn = document.getElementById('confirmOrderBtn');
    confirmBtn.disabled = true;
    confirmBtn.textContent = 'လုပ်ဆောင်နေသည်...';

    const orderId = generateOrderId();
    const newBalance = currentUser.balance - selectedProduct.price;

    const orderData = {
      id: orderId,
      userId: userId,
      userName: currentUser.name,
      userPhone: currentUser.phone,
      userEmail: currentUser.email,
      game: 'PUBG Mobile',
      product: selectedProduct.name + ' (' + selectedProduct.type + ')',
      amount: selectedProduct.price,
      pubgId: pubgId,
      ignName: ignName,
      status: 'Pending',
      orderDate: new Date().toISOString(),
      orderDateDisplay: new Date().toLocaleString()
    };

    try {
      await db.ref('orders/' + orderId).set(orderData);
      await db.ref('users/' + userId).update({ balance: newBalance });
      
      currentUser.balance = newBalance;
      localStorage.setItem('diaZoneUser', JSON.stringify(currentUser));
      sessionStorage.setItem('diaZoneUser', JSON.stringify(currentUser));
      
      closeOrderModal();
      
      const successToast = document.getElementById('successToast');
      successToast.style.display = 'block';
      setTimeout(() => {
        successToast.style.display = 'none';
        window.location.href = 'orders.html';
      }, 2000);
      
    } catch (error) {
      errorDiv.textContent = 'အော်ဒါမအောင်မြင်ပါ။ ထပ်မံကြိုးစားပါ';
      errorDiv.classList.add('show');
      confirmBtn.disabled = false;
      confirmBtn.textContent = 'အော်ဒါယူမည်';
    }
  }

    // Tab Logic
document.getElementById('ucTopupTab').onclick = () => {
    document.getElementById('ucTopupTab').classList.add('active');
    document.getElementById('codeTab').classList.remove('active');
    document.getElementById('ucTopupSection').style.display = 'block';
    document.getElementById('codeSection').style.display = 'none';
  };
  document.getElementById('codeTab').onclick = () => {
    document.getElementById('codeTab').classList.add('active');
    document.getElementById('ucTopupTab').classList.remove('active');
    document.getElementById('ucTopupSection').style.display = 'none';
    document.getElementById('codeSection').style.display = 'block';
  };

  // Navigation
  document.getElementById('backBtn').onclick = () => window.location.href = 'games.html';
  document.getElementById('cancelOrderBtn').onclick = closeOrderModal;
  document.getElementById('confirmOrderBtn').onclick = placeOrder;

  window.onclick = (e) => {
    const modal = document.getElementById('orderModal');
    if (e.target === modal) closeOrderModal();
  };

  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      const page = item.dataset.page;
      if (page === 'home') window.location.href = 'dashboard.html';
      else if (page === 'games') window.location.href = 'games.html';
      else if (page === 'wallet') window.location.href = 'wallet.html';
      else if (page === 'orders') window.location.href = 'orders.html';
      else if (page === 'profile') window.location.href = 'profile.html';
    });
  });
</script>
</body>
</html>
