<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>UC Price</title>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --bg-body: #f5f7fc; --bg-container: white; --text-primary: #0f172a; --text-secondary: #475569; --border-color: #e2e8f0; --card-bg: #f8fafc; --header-bg: linear-gradient(135deg, #0f172a, #1e293b); --price-color: #3b82f6; }
    body.dark { --bg-body: #0f172a; --bg-container: #1e293b; --text-primary: #f1f5f9; --text-secondary: #94a3b8; --border-color: #334155; --card-bg: #0f172a; --header-bg: linear-gradient(135deg, #020617, #0f172a); --price-color: #60a5fa; }
    * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s ease, color 0.2s ease; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-body); padding-bottom: 80px; }
    .container { max-width: 500px; margin: 0 auto; background: var(--bg-container); min-height: 100vh; }
    .header { background: var(--header-bg); padding: 1rem 1.2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
    .logo h1 { color: white; font-size: 1.3rem; font-weight: 700; }
    .back-btn { background: rgba(255,255,255,0.15); border: none; color: white; font-size: 0.85rem; cursor: pointer; padding: 0.4rem 1rem; border-radius: 2rem; display: flex; align-items: center; gap: 6px; }
    .title-section { padding: 1.5rem 1.2rem 0.5rem; }
    .title-section h2 { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
    .tab-buttons { display: flex; gap: 1rem; padding: 0.5rem 1.2rem; margin-top: 0.5rem; }
    .tab-btn { flex: 1; padding: 0.6rem; border-radius: 2rem; border: none; font-weight: 600; cursor: pointer; background: var(--card-bg); color: var(--text-primary); border: 1px solid var(--border-color); }
    .tab-btn.active { background: #3b82f6; color: white; border: none; }
    .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.8rem; padding: 0.8rem 1.2rem; }
    .product-card { background: var(--card-bg); border-radius: 1rem; padding: 1rem; text-align: center; cursor: pointer; border: 1px solid var(--border-color); transition: all 0.2s; }
    .product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); background: var(--bg-container); }
    .product-icon { width: 50px; height: 50px; background: linear-gradient(145deg, #3b82f6, #1d4ed8); border-radius: 1rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 0.5rem; }
    .product-icon i { font-size: 1.5rem; color: white; }
    .product-name { font-size: 1rem; font-weight: 700; color: var(--text-primary); }
    .price-row { display: flex; justify-content: center; gap: 0.5rem; margin-top: 0.3rem; }
    .current-price { font-size: 1rem; font-weight: 700; color: var(--price-color); }
    .buy-btn { background: #0f172a; color: white; border: none; padding: 0.4rem 1rem; border-radius: 2rem; font-size: 0.7rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; width: 100%; }
    .buy-btn:hover { background: #3b82f6; }
    .footer-links { padding: 1rem 1.2rem; text-align: center; border-top: 1px solid var(--border-color); margin-top: 1rem; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-container); display: flex; justify-content: space-around; align-items: center; padding: 0.6rem 1rem; border-top: 1px solid var(--border-color); max-width: 500px; margin: 0 auto; z-index: 100; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
    .nav-item i { font-size: 1.3rem; color: #94a3b8; }
    .nav-item span { font-size: 0.65rem; color: #94a3b8; }
    .nav-item.active i, .nav-item.active span { color: #3b82f6; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
    .modal.show { display: flex; }
    .modal-content { background: var(--bg-container); border-radius: 1.5rem; padding: 1.5rem; width: 90%; max-width: 400px; }
    .modal-content h3 { margin-bottom: 0.5rem; text-align: center; }
    .modal-content input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid var(--border-color); border-radius: 0.8rem; background: var(--card-bg); color: var(--text-primary); }
    .modal-buttons { display: flex; gap: 0.8rem; }
    .modal-buttons button { flex: 1; padding: 0.8rem; border-radius: 2rem; border: none; font-weight: 600; cursor: pointer; }
    .order-now-btn { background: #3b82f6; color: white; }
    .cancel-order-btn { background: #e2e8f0; color: #334155; }
    body.dark .cancel-order-btn { background: #334155; color: white; }
    .error-msg { color: #dc2626; font-size: 0.75rem; display: none; }
    .error-msg.show { display: block; }
    .processing-toast, .success-toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); color: white; padding: 0.6rem 1.2rem; border-radius: 2rem; font-size: 0.8rem; z-index: 1000; display: none; }
    .processing-toast { background: #f59e0b; }
    .success-toast { background: #10b981; }
  </style>
</head>
<body>

<div class="container">
  <div class="header"><button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Back</button><div class="logo"><h1>Dia Zone</h1></div><div style="width:60px;"></div></div>
  <div class="title-section"><h2><i class="fas fa-gamepad"></i> PUBG UC</h2></div>
  <div class="tab-buttons"><button class="tab-btn active" id="ucTopupTab">💰 UC Top Up</button><button class="tab-btn" id="codeTab">🎫 Code Price</button></div>
  <div id="ucTopupSection"><div class="product-grid" id="ucProductGrid"></div></div>
  <div id="codeSection" style="display:none;"><div class="product-grid" id="codeProductGrid"></div></div>
  <div class="footer-links"><a href="#">Privacy Policy</a><span>|</span><a href="#">Terms & Conditions</a></div>
</div>

<div class="bottom-nav">
  <div class="nav-item" data-page="home"><i class="fas fa-home"></i><span>Home</span></div>
  <div class="nav-item" data-page="games"><i class="fas fa-gamepad"></i><span>Games</span></div>
  <div class="nav-item" data-page="wallet"><i class="fas fa-wallet"></i><span>Wallet</span></div>
  <div class="nav-item" data-page="orders"><i class="fas fa-shopping-bag"></i><span>Orders</span></div>
  <div class="nav-item active" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></div>
</div>

<div id="orderModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-gamepad"></i> Complete Order</h3>
    <div id="modalProductInfo" style="margin-bottom: 1rem; font-weight: 600; color: #3b82f6; text-align: center;"></div>
    <input type="text" id="pubgId" placeholder="PUBG ID / Character ID">
    <input type="text" id="ignName" placeholder="In-game Name">
    <div id="modalError" class="error-msg"></div>
    <div class="modal-buttons">
      <button class="cancel-order-btn" id="cancelOrderBtn">Cancel</button>
      <button class="order-now-btn" id="confirmOrderBtn">Order Now</button>
    </div>
  </div>
</div>

<div id="processingToast" class="processing-toast"><i class="fas fa-spinner fa-pulse"></i> Processing... Please wait</div>
<div id="successToast" class="success-toast"><i class="fas fa-check-circle"></i> Order placed successfully!</div>

<script>
  // --- Firebase Configuration ---
  const firebaseConfig = {
    apiKey: "AIzaSyB8iE6D3N7X7qZxR9kLmNpQrStUvWxYz123456",
    authDomain: "dia-zone.firebaseapp.com",
    databaseURL: "https://dia-zone-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dia-zone",
    storageBucket: "dia-zone.appspot.com",
    messagingSenderId: "123456789012",
    appId: "1:123456789012:web:abc123def456ghi789"
  };

  // Initialize Firebase
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const db = firebase.database();

  // --- Default PUBG Prices ---
  const DEFAULT_PUBG_PRICES = {
    uc: [
      { name: "60 UC", price: 4190 },
      { name: "180 UC", price: 12730 },
      { name: "325 UC", price: 20900 },
      { name: "445 UC", price: 29500 },
      { name: "1320 UC", price: 82600 },
      { name: "1800 UC", price: 107500 },
      { name: "2785 UC", price: 171100 },
      { name: "3850 UC", price: 208000 },
      { name: "5650 UC", price: 316500 },
      { name: "8100 UC", price: 411000 }
    ],
    code: [
      { name: "60 UC Code", price: 4190 },
      { name: "180 UC Code", price: 12730 },
      { name: "325 UC Code", price: 20900 },
      { name: "445 UC Code", price: 29500 },
      { name: "1320 UC Code", price: 82600 },
      { name: "1800 UC Code", price: 107500 },
      { name: "2785 UC Code", price: 171100 },
      { name: "3850 UC Code", price: 208000 },
      { name: "5650 UC Code", price: 316500 },
      { name: "8100 UC Code", price: 411000 }
    ]
  };

  // --- Theme ---
  if (localStorage.getItem('diaZoneTheme') === 'dark') document.body.classList.add('dark');

  // --- Variables ---
  let currentUser = JSON.parse(localStorage.getItem('diaZoneUser') || sessionStorage.getItem('diaZoneUser') || 'null');
  let selectedProduct = null;
  let pubgPrices = null;
  let userId = null;

  function formatNumber(num) { return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }

  // --- Render Products ---
  function renderProducts() {
    const prices = pubgPrices || DEFAULT_PUBG_PRICES;
    
    // UC Topup
    const ucGrid = document.getElementById('ucProductGrid');
    if (ucGrid) {
      ucGrid.innerHTML = '';
      if (prices.uc && prices.uc.length > 0) {
        prices.uc.forEach(item => {
          const card = document.createElement('div'); 
          card.className = 'product-card';
          card.innerHTML = `<div class="product-icon"><i class="fas fa-coins"></i></div><div class="product-name">${item.name}</div><div class="price-row"><span class="current-price">${formatNumber(item.price)} Ks</span></div><button class="buy-btn">Buy Now</button>`;
          card.onclick = (e) => {
            if (e.target.classList.contains('buy-btn')) e.stopPropagation();
            openOrderModal(item, 'UC Top Up');
          };
          ucGrid.appendChild(card);
        });
      }
    }

    // Code Price
    const codeGrid = document.getElementById('codeProductGrid');
    if (codeGrid) {
      codeGrid.innerHTML = '';
      if (prices.code && prices.code.length > 0) {
        prices.code.forEach(item => {
          const card = document.createElement('div'); 
          card.className = 'product-card';
          card.innerHTML = `<div class="product-icon"><i class="fas fa-ticket-alt"></i></div><div class="product-name">${item.name}</div><div class="price-row"><span class="current-price">${formatNumber(item.price)} Ks</span></div><button class="buy-btn">Buy Now</button>`;
          card.onclick = (e) => {
            if (e.target.classList.contains('buy-btn')) e.stopPropagation();
            openOrderModal(item, 'UC Code');
          };
          codeGrid.appendChild(card);
        });
      }
    }
  }

  // --- Firebase Price Listener ---
  db.ref('prices/pubg').on('value', (snapshot) => {
    if (snapshot.exists()) {
      pubgPrices = snapshot.val();
    } else {
      pubgPrices = DEFAULT_PUBG_PRICES;
      db.ref('prices/pubg').set(DEFAULT_PUBG_PRICES);
    }
    renderProducts();
  });

  // --- User Check ---
  if (!currentUser) {
    window.location.href = 'login.html';
  } else {
    userId = currentUser.id || currentUser.userId;
    if (userId) {
      db.ref('users/' + userId).on('value', (snapshot) => {
        if (snapshot.exists()) {
          const data = snapshot.val();
          currentUser = { ...currentUser, ...data, id: userId };
          localStorage.setItem('diaZoneUser', JSON.stringify(currentUser));
          sessionStorage.setItem('diaZoneUser', JSON.stringify(currentUser));
        }
      });
    }
  }

  // --- Order Handling (PUBG ID + In-game Name) ---
  function openOrderModal(product, type) {
    if (!currentUser) { 
      window.location.href = 'login.html'; 
      return; 
    }
    selectedProduct = { ...product, type: type };
    document.getElementById('modalProductInfo').innerHTML = `<i class="fas fa-coins"></i> ${product.name} (${type})<br>${formatNumber(product.price)} Ks`;
    document.getElementById('pubgId').value = '';
    document.getElementById('ignName').value = '';
    document.getElementById('modalError').classList.remove('show');
    document.getElementById('orderModal').classList.add('show');
  }

  function closeOrderModal() {
    document.getElementById('orderModal').classList.remove('show');
    document.getElementById('modalError').classList.remove('show');
  }

  function generateOrderId() {
    return 'PUBG-' + Date.now().toString() + '-' + Math.random().toString(36).substr(2, 6).toUpperCase();
  }

  async function placeOrder() {
    const pubgId = document.getElementById('pubgId').value.trim();
    const ignName = document.getElementById('ignName').value.trim();
    const errorDiv = document.getElementById('modalError');

    if (!pubgId) {
      errorDiv.textContent = 'Please enter PUBG ID / Character ID';
      errorDiv.classList.add('show');
      return;
    }
    if (!ignName) {
      errorDiv.textContent = 'Please enter In-game Name';
      errorDiv.classList.add('show');
      return;
    }

    if (currentUser.balance < selectedProduct.price) {
      errorDiv.textContent = 'Insufficient balance! Please recharge.';
      errorDiv.classList.add('show');
      return;
    }

    const confirmBtn = document.getElementById('confirmOrderBtn');
    confirmBtn.disabled = true;
    confirmBtn.textContent = 'Processing...';

    const orderId = generateOrderId();
    const newBalance = currentUser.balance - selectedProduct.price;

    const orderData = {
      id: orderId,
      userId: userId,
      userName: currentUser.name,
      userPhone: currentUser.phone,
      userEmail: currentUser.email,
      game: 'PUBG Mobile',
      product: selectedProduct.name + ' (' + selectedProduct.type + ')',
      amount: selectedProduct.price,
      pubgId: pubgId,
      ignName: ignName,
      status: 'Pending',
      orderDate: new Date().toISOString(),
      orderDateDisplay: new Date().toLocaleString()
    };

    try {
      // 1. Save order to Firebase
      await db.ref('orders/' + orderId).set(orderData);
      
      // 2. Update user balance
      await db.ref('users/' + userId).update({ balance: newBalance });
      
      // 3. Update local user data
      currentUser.balance = newBalance;
      localStorage.setItem('diaZoneUser', JSON.stringify(currentUser));
      sessionStorage.setItem('diaZoneUser', JSON.stringify(currentUser));
      
      closeOrderModal();
      
      // Show success toast and redirect
      const successToast = document.getElementById('successToast');
      successToast.style.display = 'block';
      setTimeout(() => {
        successToast.style.display = 'none';
        window.location.href = 'orders.html';
      }, 2000);
      
    } catch (error) {
      console.error('Order error:', error);
      errorDiv.textContent = 'Failed to place order. Please try again.';
      errorDiv.classList.add('show');
      confirmBtn.disabled = false;
      confirmBtn.textContent = 'Order Now';
    }
  }

  // --- Tab Logic ---
  document.getElementById('ucTopupTab').onclick = () => {
    document.getElementById('ucTopupTab').classList.add('active');
    document.getElementById('codeTab').classList.remove('active');
    document.getElementById('ucTopupSection').style.display = 'block';
    document.getElementById('codeSection').style.display = 'none';
  };
  document.getElementById('codeTab').onclick = () => {
    document.getElementById('codeTab').classList.add('active');
    document.getElementById('ucTopupTab').classList.remove('active');
    document.getElementById('ucTopupSection').style.display = 'none';
    document.getElementById('codeSection').style.display = 'block';
  };

  // --- Navigation ---
  document.getElementById('backBtn').onclick = () => window.location.href = 'games.html';
  document.getElementById('cancelOrderBtn').onclick = closeOrderModal;
  document.getElementById('confirmOrderBtn').onclick = placeOrder;

  // Close modal on outside click
  window.onclick = (e) => {
    const modal = document.getElementById('orderModal');
    if (e.target === modal) closeOrderModal();
  };

  document.querySelectorAll('.nav-item').forEach(item => {
    item.onclick = () => {
      const page = item.dataset.page;
      if (page === 'home') window.location.href = 'dashboard.html';
      else if (page === 'games') window.location.href = 'games.html';
      else if (page === 'wallet') window.location.href = 'wallet.html';
      else if (page === 'orders') window.location.href = 'orders.html';
      else if (page === 'profile') window.location.href = 'profile.html';
    };
  });
</script>
</body>
</html>
