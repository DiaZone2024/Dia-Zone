<!DOCTYPE html>
<html lang="my">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0b0c1a 0%, #11132a 100%);
      font-family: 'Inter', 'Poppins', 'Myanmar Text', sans-serif;
      min-height: 100vh;
      padding-bottom: 85px;
    }

    .container {
      max-width: 550px;
      margin: 0 auto;
      background: rgba(18, 22, 48, 0.75);
      backdrop-filter: blur(12px);
      min-height: 100vh;
      border-radius: 0;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1e2348, #0c0f24);
      padding: 1rem 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #ffd966;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo h1 {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(120deg, #FFF8E7, #FFE6A3);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .back-btn {
      background: rgba(255, 215, 0, 0.15);
      border: 1px solid rgba(255, 215, 0, 0.3);
      color: #FFE6A3;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: rgba(255, 215, 0, 0.25);
      transform: translateX(-3px);
    }

    .title-section {
      padding: 1.5rem 1.2rem 0.5rem;
    }

    .title-section h2 {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(120deg, #FFF8E7, #FFE6A3);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .title-section h2 i {
      color: #FFC857;
      margin-right: 8px;
    }

    .section-title {
      padding: 1rem 1.2rem 0.5rem;
    }

    .section-title h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #FFE6A3;
      border-left: 4px solid #FFC857;
      padding-left: 0.8rem;
    }

    /* Diamond Grid */
    .diamond-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.8rem;
      padding: 0.8rem 1.2rem;
    }

    .diamond-card {
      position: relative;
      background: rgba(10, 12, 28, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 1rem;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      border: 1px solid rgba(255, 215, 0, 0.2);
      transition: all 0.2s;
      overflow: hidden;
    }

    /* Background Image for diamond cards */
    .diamond-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: var(--card-bg-img);
      background-size: cover;
      background-position: center;
      opacity: 0.3;
      z-index: 0;
      transition: opacity 0.3s;
    }

    .diamond-card:hover::before {
      opacity: 0.5;
    }

    .diamond-card > * {
      position: relative;
      z-index: 1;
    }

    .diamond-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      border-color: rgba(255, 215, 0, 0.5);
      background: rgba(255, 215, 0, 0.05);
    }

    .diamond-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(145deg, #FFC857, #FFAE2B);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 0.5rem;
    }

    .diamond-icon i {
      font-size: 1.5rem;
      color: #12142e;
    }

    .diamond-amount {
      font-size: 0.9rem;
      font-weight: 700;
      color: #FFE6A3;
    }

    .price-row {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.3rem;
    }

    .current-price {
      font-size: 0.9rem;
      font-weight: 700;
      color: #FFC857;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(95deg, #ef4444, #dc2626);
      color: white;
      font-size: 0.6rem;
      padding: 0.2rem 0.5rem;
      border-radius: 1rem;
      margin-bottom: 0.3rem;
    }

    .weekly-badge {
      background: linear-gradient(95deg, #10b981, #059669);
    }

    .buy-btn {
      background: linear-gradient(95deg, #FFC857, #FFAE2B);
      color: #12142e;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      width: 100%;
      transition: all 0.2s;
    }

    .buy-btn:hover {
      transform: scale(0.98);
      background: linear-gradient(95deg, #FFD46E, #FFB83B);
    }

    .footer-links {
      padding: 1rem 1.2rem;
      text-align: center;
      border-top: 1px solid rgba(255, 215, 0, 0.1);
      margin-top: 1rem;
    }

    .footer-links a {
      color: #9ba3e0;
      text-decoration: none;
      font-size: 0.7rem;
      margin: 0 0.5rem;
    }

    .footer-links span {
      color: #4c5290;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10, 12, 28, 0.95);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0.6rem 1rem;
      border-top: 1px solid rgba(255, 215, 0, 0.2);
      max-width: 550px;
      margin: 0 auto;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 1.2rem;
      transition: all 0.2s;
      font-family: inherit;
    }

    .nav-icon {
      font-size: 1.4rem;
    }

    .nav-label {
      font-size: 0.7rem;
      font-weight: 500;
      color: #a3abdf;
      letter-spacing: 0.3px;
    }

    .nav-item.active .nav-label {
      color: #FFD966;
      font-weight: 600;
    }

    .nav-item.active .nav-icon {
      color: #FFD966;
    }

    .nav-item:hover {
      background: rgba(255, 215, 0, 0.08);
      transform: translateY(-2px);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: #1a1e3a;
      border-radius: 1.5rem;
      padding: 1.5rem;
      width: 90%;
      max-width: 400px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-content h3 {
      font-size: 1.3rem;
      margin-bottom: 1rem;
      color: #FFE6A3;
      text-align: center;
    }

    #modalProductInfo {
      margin-bottom: 1rem;
      font-weight: 700;
      color: #FFC857;
      text-align: center;
      padding: 0.5rem;
      background: rgba(255, 215, 0, 0.1);
      border-radius: 0.8rem;
    }

    .quantity-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding: 0.5rem;
      background: rgba(10, 12, 28, 0.7);
      border-radius: 0.8rem;
      border: 1px solid rgba(255, 215, 0, 0.2);
    }

    .quantity-row label {
      font-weight: 600;
      color: #FFE6A3;
      font-size: 0.85rem;
    }

    .quantity-row input {
      flex: 1;
      padding: 0.6rem;
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 0.8rem;
      background: #0f122e;
      color: white;
      text-align: center;
      font-size: 0.9rem;
    }

    .quantity-row input:focus {
      outline: none;
      border-color: #FFC857;
    }

    .quantity-info {
      font-size: 0.7rem;
      color: #9ba3e0;
      text-align: center;
      margin-top: -0.5rem;
      margin-bottom: 0.8rem;
    }

    .modal-content input {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1rem;
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 0.8rem;
      background: #0f122e;
      color: white;
    }

    .modal-content input:focus {
      outline: none;
      border-color: #FFC857;
    }

    .modal-content input::placeholder {
      color: #6c72a5;
    }

    .modal-buttons {
      display: flex;
      gap: 0.8rem;
      margin-top: 0.5rem;
    }

    .modal-buttons button {
      flex: 1;
      padding: 0.8rem;
      border-radius: 2rem;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }

    .order-now-btn {
      background: linear-gradient(95deg, #FFC857, #FFAE2B);
      color: #12142e;
    }

    .cancel-order-btn {
      background: rgba(255, 255, 255, 0.1);
      color: #b9c3ff;
    }

    .error-msg {
      color: #ff6b6b;
      font-size: 0.75rem;
      display: none;
      margin-bottom: 0.8rem;
      text-align: center;
    }

    .error-msg.show {
      display: block;
    }

    .processing-toast, .success-toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      z-index: 1000;
      display: none;
    }

    .processing-toast {
      background: #f59e0b;
    }

    .success-toast {
      background: #10b981;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Back</button>
    <div class="logo"><h1>Dia Zone</h1></div>
    <div style="width:60px;"></div>
  </div>
  
  <div class="title-section">
    <h2><i class="fas fa-gem"></i> Mobile Legend Diamonds</h2>
  </div>
  
  <div class="section-title"><h3>📅 Weekly Pass</h3></div>
  <div class="diamond-grid" id="weeklyPassGrid"></div>
  
  <div class="section-title"><h3>✨ 2x Diamonds (First Recharge)</h3></div>
  <div class="diamond-grid" id="firstRechargeGrid"></div>
  
  <div class="section-title"><h3>💎 Other Diamonds</h3></div>
  <div class="diamond-grid" id="otherDiamondsGrid"></div>
  
  <div class="footer-links">
    <a href="#">Privacy Policy</a><span>|</span><a href="#">Terms & Conditions</a>
  </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <button class="nav-item" data-page="home">
    <div class="nav-icon">🏠</div>
    <div class="nav-label">Home</div>
  </button>
  <button class="nav-item" data-page="games">
    <div class="nav-icon">🎮</div>
    <div class="nav-label">Games</div>
  </button>
  <button class="nav-item" data-page="wallet">
    <div class="nav-icon">👛</div>
    <div class="nav-label">Wallet</div>
  </button>
  <button class="nav-item" data-page="orders">
    <div class="nav-icon">📦</div>
    <div class="nav-label">Orders</div>
  </button>
  <button class="nav-item" data-page="profile">
    <div class="nav-icon">👤</div>
    <div class="nav-label">Profile</div>
  </button>
</div>

<!-- Order Modal -->
<div id="orderModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-shopping-cart"></i> Complete Order</h3>
    <div id="modalProductInfo" style="margin-bottom: 1rem; font-weight: 600;"></div>
    
    <div id="quantityContainer" style="display: none;">
      <div class="quantity-row">
        <label><i class="fas fa-hashtag"></i> Quantity (Weeks)</label>
        <input type="number" id="quantityInput" min="1" max="10" value="1" step="1">
      </div>
      <div class="quantity-info">* 1 week per quantity (Min: 1, Max: 10)</div>
    </div>
    
    <input type="text" id="gameId" placeholder="Game ID">
    <input type="text" id="serverId" placeholder="Server ID">
    <div id="modalError" class="error-msg"></div>
    <div class="modal-buttons">
      <button class="cancel-order-btn" id="cancelOrderBtn">Cancel</button>
      <button class="order-now-btn" id="confirmOrderBtn">Order Now</button>
    </div>
  </div>
</div>

<div id="processingToast" class="processing-toast"><i class="fas fa-spinner fa-pulse"></i> Processing... Please wait</div>
<div id="successToast" class="success-toast"><i class="fas fa-check-circle"></i> Order placed successfully!</div>

      { diamonds: "22", price: 1780, originalPrice: 1778, bgImage: "image/dia.jpg" },

      { diamonds: "44", price: 3600, originalPrice: 3595, bgImage: "image/dia.jpg" },

      { diamonds: "257", price: 15600, originalPrice: 15574, bgImage: "image/dia.jpg" },

      { diamonds: "515", price: 31900, originalPrice: 31849, bgImage: "image/dia.jpg" },
      { diamonds: "600", price: 37050, originalPrice: 36989, bgImage: "image/dia.jpg" },
      { diamonds: "706", price: 42000, originalPrice: 41929, bgImage: "image/dia.jpg" },
      { diamonds: "878", price: 53920, originalPrice: 53831, bgImage: "image/dia.jpg" },
      { diamonds: "963", price: 58900, originalPrice: 58803, bgImage: "image/dia.jpg" },
      { diamonds: "1049", price: 64300, originalPrice: 64194, bgImage: "image/dia.jpg" },
      { diamonds: "1135", price: 69800, originalPrice: 69704, bgImage: "image/dia.jpg" },
      { diamonds: "1412", price: 85800, originalPrice: 85692, bgImage: "image/dia.jpg" },
      { diamonds: "2195", price: 131000, originalPrice: 130786, bgImage: "image/dia.jpg" },
      { diamonds: "2901", price: 173200, originalPrice: 172915, bgImage: "image/dia.jpg" },
      { diamonds: "3688", price: 215800, originalPrice: 215442, bgImage: "image/dia.jpg" },
      { diamonds: "4394", price: 260400, originalPrice: 259971, bgImage: "image/dia.jpg" },
      { diamonds: "5532", price: 323400, originalPrice: 322859, bgImage: "image/dia.jpg" },
      { diamonds: "9288", price: 531200, originalPrice: 530301, bgImage: "image/dia.jpg" }
    ]
  };
let currentUser = null;
  let selectedProduct = null;
  let selectedProductType = null;
  let mlPrices = null;

  function formatNumber(num) { return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }

  function loadUserData() {
    currentUser = JSON.parse(localStorage.getItem('diaZoneUser') || sessionStorage.getItem('diaZoneUser') || 'null');
    if (!currentUser) {
      window.location.href = 'login.html';
      return false;
    }
    return true;
  }

  function renderWeeklyPass() {
    const grid = document.getElementById('weeklyPassGrid');
    if (!grid) return;
    grid.innerHTML = '';
    const item = mlPrices?.weeklyPass || DEFAULT_ML_PRICES.weeklyPass;
    const card = document.createElement('div');
    card.className = 'diamond-card';
    card.style.setProperty('--card-bg-img', `url('${item.bgImage || "image/weekly.jpg"}')`);
    card.innerHTML = `
      <div class="diamond-icon"><i class="fas fa-calendar-week"></i></div>
      <div class="badge weekly-badge">🔥 Best Value</div>
      <div class="diamond-amount">${item.name}</div>
      <div class="price-row"><span class="current-price">${formatNumber(item.price)} Ks / week</span></div>
      <button class="buy-btn">Buy Now</button>
    `;
    card.onclick = () => openOrderModal(item, item.name, 'weekly');
    grid.appendChild(card);
  }

  function renderFirstRecharge() {
    const grid = document.getElementById('firstRechargeGrid');
    if (!grid) return;
    grid.innerHTML = '';
    const items = mlPrices?.firstRecharge || DEFAULT_ML_PRICES.firstRecharge;
    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'diamond-card';
      card.style.setProperty('--card-bg-img', `url('${item.bgImage || "image/Double.jpg"}')`);
      card.innerHTML = `
        <div class="diamond-icon"><i class="fas fa-gem"></i></div>
        <div class="badge">2x Bonus</div>
        <div class="diamond-amount">${item.diamonds} Diamonds</div>
        <div class="price-row"><span class="current-price">${formatNumber(item.price)} Ks</span></div>
        <button class="buy-btn">Buy Now</button>
      `;
      card.onclick = () => openOrderModal(item, item.diamonds + " Diamonds (2x Bonus)", 'firstRecharge');
      grid.appendChild(card);
    });
  }

  function renderOtherDiamonds() {
    const grid = document.getElementById('otherDiamondsGrid');
    if (!grid) return;
    grid.innerHTML = '';
    const items = mlPrices?.otherDiamonds || DEFAULT_ML_PRICES.otherDiamonds;
    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'diamond-card';
      card.style.setProperty('--card-bg-img', `url('${item.bgImage || "image/dia.jpg"}')`);
      card.innerHTML = `
        <div class="diamond-icon"><i class="fas fa-gem"></i></div>
        <div class="diamond-amount">${item.diamonds} Diamonds</div>
        <div class="price-row"><span class="current-price">${formatNumber(item.price)} Ks</span></div>
        <button class="buy-btn">Buy Now</button>
      `;
      card.onclick = () => openOrderModal(item, item.diamonds + " Diamonds", 'other');
      grid.appendChild(card);
    });
  }

  function renderUI() {
    renderWeeklyPass();
    renderFirstRecharge();
    renderOtherDiamonds();
  }

  function openOrderModal(product, label, type) {
    if (!currentUser) {
      window.location.href = 'login.html';
      return;
    }
    selectedProduct = { ...product, label: label };
    selectedProductType = type;
    
    const quantityContainer = document.getElementById('quantityContainer');
    const quantityInput = document.getElementById('quantityInput');
    
    if (type === 'weekly') {
      quantityContainer.style.display = 'block';
      quantityInput.value = 1;
      
      const updatePriceDisplay = () => {
        let qty = parseInt(quantityInput.value);
        if (isNaN(qty)) qty = 1;
        if (qty < 1) { quantityInput.value = 1; qty = 1; }
        if (qty > 10) { quantityInput.value = 10; qty = 10; }
        const totalPrice = product.price * qty;
        document.getElementById('modalProductInfo').innerHTML = `${label} - ${formatNumber(product.price)} Ks/week × ${qty} = <strong>${formatNumber(totalPrice)} Ks</strong>`;
      };
      
      quantityInput.addEventListener('input', updatePriceDisplay);
      updatePriceDisplay();
    } else {
      quantityContainer.style.display = 'none';
      document.getElementById('modalProductInfo').innerHTML = `${label} - <strong>${formatNumber(product.price)} Ks</strong>`;
    }
    
    document.getElementById('gameId').value = '';
    document.getElementById('serverId').value = '';
    document.getElementById('modalError').classList.remove('show');
    document.getElementById('orderModal').classList.add('show');
  }

  function closeOrderModal() {
    document.getElementById('orderModal').classList.remove('show');
  }

  function generateOrderId() {
    return 'ML-' + Date.now().toString() + '-' + Math.random().toString(36).substr(2, 6).toUpperCase();
  }

  async function placeOrder() {
    const gameId = document.getElementById('gameId').value.trim();
    const serverId = document.getElementById('serverId').value.trim();
    const errorDiv = document.getElementById('modalError');

    if (!gameId) {
      errorDiv.textContent = "Please enter Game ID";
      errorDiv.classList.add('show');
      return;
    }
    if (!serverId) {
      errorDiv.textContent = "Please enter Server ID";
      errorDiv.classList.add('show');
      return;
    }

    let finalPrice = selectedProduct.price;
    let quantity = 1;
    let productLabel = selectedProduct.label;
    
    if (selectedProductType === 'weekly') {
      const qtyInput = document.getElementById('quantityInput');
      quantity = parseInt(qtyInput.value);
      if (isNaN(quantity)) quantity = 1;
      if (quantity < 1) quantity = 1;
      if (quantity > 10) quantity = 10;
      finalPrice = selectedProduct.price * quantity;
      productLabel = `${selectedProduct.label} × ${quantity} weeks`;
    }

    if (currentUser.balance < finalPrice) {
      errorDiv.textContent = "Not Enough Money! Please recharge first.";
      errorDiv.classList.add('show');
      return;
    }
    const confirmBtn = document.getElementById('confirmOrderBtn');
    confirmBtn.disabled = true;
    confirmBtn.textContent = "Processing...";

    const orderId = generateOrderId();
    const newBalance = currentUser.balance - finalPrice;
    const userId = currentUser.id || currentUser.userId;

    const orderData = {
      id: orderId,
      userId: userId,
      userName: currentUser.name,
      userPhone: currentUser.phone,
      userEmail: currentUser.email,
      game: 'Mobile Legend',
      product: productLabel,
      amount: finalPrice,
      quantity: quantity,
      gameId: gameId,
      serverId: serverId,
      status: 'Pending',
      orderDate: new Date().toISOString(),
      orderDateDisplay: new Date().toLocaleString()
    };

    try {
      await db.ref('orders/' + orderId).set(orderData);
      await db.ref('users/' + userId).update({ balance: newBalance });
      
      currentUser.balance = newBalance;
      localStorage.setItem('diaZoneUser', JSON.stringify(currentUser));
      sessionStorage.setItem('diaZoneUser', JSON.stringify(currentUser));
      
      closeOrderModal();
      
      const successToast = document.getElementById('successToast');
      successToast.style.display = 'block';
      setTimeout(() => {
        successToast.style.display = 'none';
        window.location.href = 'orders.html';
      }, 2000);
      
    } catch (error) {
      errorDiv.textContent = "Order failed. Please try again.";
      errorDiv.classList.add('show');
      confirmBtn.disabled = false;
      confirmBtn.textContent = "Order Now";
    }
  }

  function initFirebaseListeners() {
    db.ref('prices/mobile_legend').on('value', (snapshot) => {
      if (snapshot.exists()) {
        mlPrices = snapshot.val();
      } else {
        mlPrices = DEFAULT_ML_PRICES;
        db.ref('prices/mobile_legend').set(DEFAULT_ML_PRICES);
      }
      renderUI();
    });
    
    if (currentUser) {
      const userId = currentUser.id || currentUser.userId;
      db.ref('users/' + userId).on('value', (snapshot) => {
        if (snapshot.exists()) {
          const updatedUser = snapshot.val();
          currentUser = { ...currentUser, ...updatedUser };
          localStorage.setItem('diaZoneUser', JSON.stringify(currentUser));
          sessionStorage.setItem('diaZoneUser', JSON.stringify(currentUser));
        }
      });
    }
  }

  // Event Listeners
  document.getElementById('backBtn').onclick = () => window.location.href = 'games.html';
  document.getElementById('cancelOrderBtn').onclick = closeOrderModal;
  document.getElementById('confirmOrderBtn').onclick = placeOrder;

  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      const page = item.dataset.page;
      if (page === 'home') window.location.href = 'dashboard.html';
      else if (page === 'games') window.location.href = 'games.html';
      else if (page === 'wallet') window.location.href = 'wallet.html';
      else if (page === 'orders') window.location.href = 'orders.html';
      else if (page === 'profile') window.location.href = 'profile.html';
    });
  });

  window.onclick = (e) => {
    const modal = document.getElementById('orderModal');
    if (e.target === modal) closeOrderModal();
  };

  if (loadUserData()) {
    initFirebaseListeners();
  }
</script>
</body>
</html>
