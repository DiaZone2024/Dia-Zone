<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Mobile Legend Diamonds</title>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --bg-body: #f5f7fc; --bg-container: white; --text-primary: #0f172a; --text-secondary: #475569; --border-color: #e2e8f0; --card-bg: #f8fafc; --header-bg: linear-gradient(135deg, #0f172a, #1e293b); --price-color: #3b82f6; }
    body.dark { --bg-body: #0f172a; --bg-container: #1e293b; --text-primary: #f1f5f9; --text-secondary: #94a3b8; --border-color: #334155; --card-bg: #0f172a; --header-bg: linear-gradient(135deg, #020617, #0f172a); --price-color: #60a5fa; }
    * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s ease, color 0.2s ease; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-body); padding-bottom: 80px; }
    .container { max-width: 500px; margin: 0 auto; background: var(--bg-container); min-height: 100vh; }
    .header { background: var(--header-bg); padding: 1rem 1.2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
    .logo h1 { color: white; font-size: 1.3rem; font-weight: 700; }
    .back-btn { background: rgba(255,255,255,0.15); border: none; color: white; font-size: 0.85rem; cursor: pointer; padding: 0.4rem 1rem; border-radius: 2rem; display: flex; align-items: center; gap: 6px; }
    .title-section { padding: 1.5rem 1.2rem 0.5rem; }
    .title-section h2 { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
    .section-title { padding: 1rem 1.2rem 0.5rem; }
    .section-title h3 { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); border-left: 4px solid #3b82f6; padding-left: 0.8rem; }
    .diamond-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.8rem; padding: 0.8rem 1.2rem; }
    .diamond-card { background: var(--card-bg); border-radius: 1rem; padding: 1rem; text-align: center; cursor: pointer; border: 1px solid var(--border-color); transition: all 0.2s; }
    .diamond-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); background: var(--bg-container); }
    .diamond-icon { width: 50px; height: 50px; background: linear-gradient(145deg, #3b82f6, #1d4ed8); border-radius: 1rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 0.5rem; }
    .diamond-icon i { font-size: 1.5rem; color: white; }
    .diamond-amount { font-size: 1rem; font-weight: 700; color: var(--text-primary); }
    .price-row { display: flex; justify-content: center; gap: 0.5rem; margin-top: 0.3rem; }
    .current-price { font-size: 1rem; font-weight: 700; color: var(--price-color); }
    .badge { display: inline-block; background: #ef4444; color: white; font-size: 0.6rem; padding: 0.2rem 0.5rem; border-radius: 1rem; margin-bottom: 0.3rem; }
    .weekly-badge { background: #10b981; }
    .buy-btn { background: #0f172a; color: white; border: none; padding: 0.4rem 1rem; border-radius: 2rem; font-size: 0.7rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; width: 100%; }
    .buy-btn:hover { background: #3b82f6; }
    .footer-links { padding: 1rem 1.2rem; text-align: center; border-top: 1px solid var(--border-color); margin-top: 1rem; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-container); display: flex; justify-content: space-around; align-items: center; padding: 0.6rem 1rem; border-top: 1px solid var(--border-color); max-width: 500px; margin: 0 auto; z-index: 100; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
    .nav-item i { font-size: 1.3rem; color: #94a3b8; }
    .nav-item span { font-size: 0.65rem; color: #94a3b8; }
    .nav-item.active i, .nav-item.active span { color: #3b82f6; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
    .modal.show { display: flex; }
    .modal-content { background: var(--bg-container); border-radius: 1.5rem; padding: 1.5rem; width: 90%; max-width: 400px; }
    .modal-content input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid var(--border-color); border-radius: 0.8rem; background: var(--card-bg); color: var(--text-primary); }
    .modal-buttons { display: flex; gap: 0.8rem; }
    .modal-buttons button { flex: 1; padding: 0.8rem; border-radius: 2rem; border: none; font-weight: 600; cursor: pointer; }
    .order-now-btn { background: #3b82f6; color: white; }
    .cancel-order-btn { background: #e2e8f0; color: #334155; }
    .error-msg { color: #dc2626; font-size: 0.75rem; display: none; }
    .error-msg.show { display: block; }
    .processing-toast, .success-toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); color: white; padding: 0.6rem 1.2rem; border-radius: 2rem; font-size: 0.8rem; z-index: 1000; display: none; }
    .processing-toast { background: #f59e0b; }
    .success-toast { background: #10b981; }
    
    .quantity-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding: 0.5rem;
      background: var(--card-bg);
      border-radius: 0.8rem;
      border: 1px solid var(--border-color);
    }
    .quantity-row label {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.85rem;
    }
    .quantity-row input {
      flex: 1;
      margin-bottom: 0;
      text-align: center;
    }
    .quantity-info {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-align: center;
      margin-top: -0.5rem;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Back</button>
    <div class="logo"><h1>Dia Zone</h1></div>
    <div style="width:60px;"></div>
  </div>
  <div class="title-section"><h2><i class="fas fa-gem"></i> Mobile Legend Diamonds</h2></div>
  
  <div class="section-title"><h3>📅 Weekly Pass</h3></div>
  <div class="diamond-grid" id="weeklyPassGrid"></div>
  
  <div class="section-title"><h3>✨ 2x Diamonds (First Recharge)</h3></div>
  <div class="diamond-grid" id="firstRechargeGrid"></div>
  
  <div class="section-title"><h3>💎 Other Diamonds</h3></div>
  <div class="diamond-grid" id="otherDiamondsGrid"></div>
  
  <div class="footer-links"><a href="#">Privacy Policy</a><span>|</span><a href="#">Terms & Conditions</a></div>
</div>

<div class="bottom-nav">
  <div class="nav-item" data-page="home"><i class="fas fa-home"></i><span>Home</span></div>
  <div class="nav-item" data-page="games"><i class="fas fa-gamepad"></i><span>Games</span></div>
  <div class="nav-item" data-page="wallet"><i class="fas fa-wallet"></i><span>Wallet</span></div>
  <div class="nav-item" data-page="orders"><i class="fas fa-shopping-bag"></i><span>Orders</span></div>
  <div class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></div>
</div>

<div id="orderModal" class="modal">
  <div class="modal-content">
    <h3>Complete Order</h3>
    <div id="modalProductInfo" style="margin-bottom: 1rem; font-weight: 600; color: #3b82f6;"></div>
    
    <div id="quantityContainer" style="display: none;">
      <div class="quantity-row">
        <label><i class="fas fa-hashtag"></i> Quantity (Weeks)</label>
        <input type="number" id="quantityInput" min="1" max="10" value="1" step="1">
      </div>
      <div class="quantity-info">* 1 week per quantity (Min: 1, Max: 10)</div>
    </div>
    
    <input type="text" id="gameId" placeholder="Game ID">
    <input type="text" id="serverId" placeholder="Server ID">
    <div id="modalError" class="error-msg"></div>
    <div class="modal-buttons">
      <button class="cancel-order-btn" id="cancelOrderBtn">Cancel</button>
      <button class="order-now-btn" id="confirmOrderBtn">Order Now</button>
    </div>
  </div>
</div>

<div id="processingToast" class="processing-toast"><i class="fas fa-spinner fa-pulse"></i> Processing... Please wait</div>
<div id="successToast" class="success-toast"><i class="fas fa-check-circle"></i> Order placed successfully!</div>

<script>
  // --- Firebase Config ---
  const firebaseConfig = {
  apiKey: "AIzaSyB8iE6D3N7X7qZxR9kLmNpQrStUvWxYz123456",
  authDomain: "dia-zone.firebaseapp.com",
  databaseURL: "https://dia-zone-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dia-zone",
  storageBucket: "dia-zone.appspot.com",
  messagingSenderId: "123456789012",
  appId: "1:123456789012:web:abc123def456ghi789"
};
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // --- Default Prices ---
  const DEFAULT_ML_PRICES = {
    weeklyPass: {
      name: "Weekly Diamond Pass",
      diamonds: "Weekly Pass",
      price: 6500,
      originalPrice: 8500
    },
    firstRecharge: [
      { diamonds: "50+50", price: 3400, originalPrice: 3395 },
      { diamonds: "150+150", price: 10400, originalPrice: 10383 },
      { diamonds: "250+250", price: 16500, originalPrice: 16473 },
      { diamonds: "500+500", price: 33650, originalPrice: 33594 }
    ],
    otherDiamonds: [
      { diamonds: "11", price: 900, originalPrice: 892 },
      { diamonds: "22", price: 1780, originalPrice: 1778 },
      { diamonds: "33", price: 2700, originalPrice: 2696 },
      { diamonds: "44", price: 3600, originalPrice: 3595 },
      { diamonds: "86", price: 5390, originalPrice: 5381 },
      { diamonds: "172", price: 10720, originalPrice: 10702 },
      { diamonds: "257", price: 15600, originalPrice: 15574 },
      { diamonds: "343", price: 21100, originalPrice: 21065 },
      { diamonds: "429", price: 26500, originalPrice: 26456 },
      { diamonds: "515", price: 31900, originalPrice: 31849 },
      { diamonds: "600", price: 37050, originalPrice: 36989 },
      { diamonds: "706", price: 42000, originalPrice: 41929 },
      { diamonds: "878", price: 53920, originalPrice: 53831 },
      { diamonds: "963", price: 58900, originalPrice: 58803 },
      { diamonds: "1049", price: 64300, originalPrice: 64194 },
      { diamonds: "1135", price: 69800, originalPrice: 69704 },
      { diamonds: "1412", price: 85800, originalPrice: 85692 },
      { diamonds: "2195", price: 131000, originalPrice: 130786 },
      { diamonds: "2901", price: 173200, originalPrice: 172915 },
      { diamonds: "3688", price: 215800, originalPrice: 215442 },
      { diamonds: "4394", price: 260400, originalPrice: 259971 },
      { diamonds: "5532", price: 323400, originalPrice: 322859 },
      { diamonds: "9288", price: 531200, originalPrice: 530301 }
    ]
  };

  // --- Variables ---
  let currentUser = null;
  let selectedProduct = null;
  let selectedProductType = null;
  let mlPrices = null;

  function formatNumber(num) { return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }

  function loadUserData() {
    currentUser = JSON.parse(localStorage.getItem('diaZoneUser') || sessionStorage.getItem('diaZoneUser') || 'null');
    if (!currentUser) {
      window.location.href = 'login.html';
      return false;
    }
    return true;
  }

  // --- Render Functions ---
  function renderWeeklyPass() {
    const grid = document.getElementById('weeklyPassGrid');
    if (!grid) return;
    grid.innerHTML = '';
    const item = mlPrices?.weeklyPass || DEFAULT_ML_PRICES.weeklyPass;
    if (!item) return;
    const card = document.createElement('div');
    card.className = 'diamond-card';
    card.innerHTML = `
      <div class="diamond-icon"><i class="fas fa-calendar-week"></i></div>
      <div class="badge weekly-badge">🔥 Best Value</div>
      <div class="diamond-amount">${item.name}</div>
      <div class="price-row"><span class="current-price">${formatNumber(item.price)} Ks / week</span></div>
      <button class="buy-btn">Buy Now</button>
    `;
    card.onclick = () => openOrderModal(item, item.name, 'weekly');
    grid.appendChild(card);
  }

  function renderFirstRecharge() {
    const grid = document.getElementById('firstRechargeGrid');
    if (!grid) return;
    grid.innerHTML = '';
    const items = mlPrices?.firstRecharge || DEFAULT_ML_PRICES.firstRecharge;
    if (!items) return;
    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'diamond-card';
      card.innerHTML = `
        <div class="diamond-icon"><i class="fas fa-gem"></i></div>
        <div class="badge">2x Bonus</div>
        <div class="diamond-amount">${item.diamonds} Diamonds</div>
        <div class="price-row"><span class="current-price">${formatNumber(item.price)} Ks</span></div>
        <button class="buy-btn">Buy Now</button>
      `;
      card.onclick = () => openOrderModal(item, item.diamonds + " Diamonds (2x Bonus)", 'firstRecharge');
      grid.appendChild(card);
    });
  }

  function renderOtherDiamonds() {
    const grid = document.getElementById('otherDiamondsGrid');
    if (!grid) return;
    grid.innerHTML = '';
    const items = mlPrices?.otherDiamonds || DEFAULT_ML_PRICES.otherDiamonds;
    if (!items) return;
    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'diamond-card';
      card.innerHTML = `
        <div class="diamond-icon"><i class="fas fa-gem"></i></div>
        <div class="diamond-amount">${item.diamonds} Diamonds</div>
        <div class="price-row"><span class="current-price">${formatNumber(item.price)} Ks</span></div>
        <button class="buy-btn">Buy Now</button>
      `;
      card.onclick = () => openOrderModal(item, item.diamonds + " Diamonds", 'other');
      grid.appendChild(card);
    });
  }

  function renderUI() {
    renderWeeklyPass();
    renderFirstRecharge();
    renderOtherDiamonds();
  }

  // --- Order Functions ---
  function openOrderModal(product, label, type) {
    if (!currentUser) {
      window.location.href = 'login.html';
      return;
    }
    selectedProduct = { ...product, label: label };
    selectedProductType = type;
    
    const quantityContainer = document.getElementById('quantityContainer');
    const quantityInput = document.getElementById('quantityInput');
    
    if (type === 'weekly') {
      quantityContainer.style.display = 'block';
      quantityInput.value = 1;
      
      // Remove old listeners and add new ones
      const newQuantityInput = quantityInput.cloneNode(true);
      quantityInput.parentNode.replaceChild(newQuantityInput, quantityInput);
      const finalQuantityInput = document.getElementById('quantityInput');
      
      const updatePriceDisplay = () => {
        let qty = parseInt(finalQuantityInput.value);
        if (isNaN(qty)) qty = 1;
        if (qty < 1) { finalQuantityInput.value = 1; qty = 1; }
        if (qty > 10) { finalQuantityInput.value = 10; qty = 10; }
        const totalPrice = product.price * qty;
        document.getElementById('modalProductInfo').textContent = 
          `${label} - ${formatNumber(product.price)} Ks/week × ${qty} = ${formatNumber(totalPrice)} Ks`;
      };
      
      finalQuantityInput.addEventListener('input', updatePriceDisplay);
      finalQuantityInput.addEventListener('change', updatePriceDisplay);
      
      // Prevent mouse wheel from jumping
      finalQuantityInput.addEventListener('wheel', function(e) {
        e.preventDefault();
        let val = parseInt(this.value);
        if (e.deltaY < 0) val++;
        else val--;
        if (val < 1) val = 1;
        if (val > 10) val = 10;
        this.value = val;
        updatePriceDisplay();
      });
      
      updatePriceDisplay();
    } else {
      quantityContainer.style.display = 'none';
      document.getElementById('modalProductInfo').textContent = `${label} - ${formatNumber(product.price)} Ks`;
    }
    
    document.getElementById('gameId').value = '';
    document.getElementById('serverId').value = '';
    document.getElementById('modalError').classList.remove('show');
    document.getElementById('orderModal').classList.add('show');
  }

  function closeOrderModal() {
    document.getElementById('orderModal').classList.remove('show');
    document.getElementById('modalError').classList.remove('show');
  }

  function generateOrderId() {
    return 'ML-' + Date.now().toString() + '-' + Math.random().toString(36).substr(2, 6).toUpperCase();
  }

  async function placeOrder() {
    const gameId = document.getElementById('gameId').value.trim();
    const serverId = document.getElementById('serverId').value.trim();
    const errorDiv = document.getElementById('modalError');

    if (!gameId) {
      errorDiv.textContent = "Please enter Game ID";
      errorDiv.classList.add('show');
      return;
    }
    if (!serverId) {
      errorDiv.textContent = "Please enter Server ID";
      errorDiv.classList.add('show');
      return;
    }

    let finalPrice = selectedProduct.price;
    let quantity = 1;
    let productLabel = selectedProduct.label;
    
    if (selectedProductType === 'weekly') {
      const qtyInput = document.getElementById('quantityInput');
      quantity = parseInt(qtyInput.value);
      if (isNaN(quantity)) quantity = 1;
      if (quantity < 1) quantity = 1;
      if (quantity > 10) quantity = 10;
      finalPrice = selectedProduct.price * quantity;
      productLabel = `${selectedProduct.label} × ${quantity} weeks`;
    }

    if (currentUser.balance < finalPrice) {
      errorDiv.textContent = "Not Enough Money! Please recharge first.";
      errorDiv.classList.add('show');
      return;
    }

    const confirmBtn = document.getElementById('confirmOrderBtn');
    confirmBtn.disabled = true;
    confirmBtn.textContent = "Processing...";

    const orderId = generateOrderId();
    const newBalance = currentUser.balance - finalPrice;
    const userId = currentUser.id || currentUser.phone;

    const orderData = {
      id: orderId,
      userId: userId,
      userName: currentUser.name,
      userPhone: currentUser.phone,
      userEmail: currentUser.email,
      game: 'Mobile Legend',
      product: productLabel,
      amount: finalPrice,
      quantity: quantity,
      gameId: gameId,
      serverId: serverId,
      status: 'Pending',
      orderDate: new Date().toISOString(),
      orderDateDisplay: new Date().toLocaleString()
    };

    try {
      await db.ref('orders/' + orderId).set(orderData);
      await db.ref('users/' + userId).update({ balance: newBalance });
      
      currentUser.balance = newBalance;
      localStorage.setItem('diaZoneUser', JSON.stringify(currentUser));
      sessionStorage.setItem('diaZoneUser', JSON.stringify(currentUser));
      
      closeOrderModal();
      
      const successToast = document.getElementById('successToast');
      successToast.style.display = 'block';
      setTimeout(() => {
        successToast.style.display = 'none';
        window.location.href = 'orders.html';
      }, 2000);
      
    } catch (error) {
      console.error("Order error:", error);
      errorDiv.textContent = "Order failed. Please try again.";
      errorDiv.classList.add('show');
      confirmBtn.disabled = false;
      confirmBtn.textContent = "Order Now";
    }
  }

  // --- Firebase Listeners ---
  function initFirebaseListeners() {
  db.ref('prices/mobile_legend').on('value', (snapshot) => {
    if (snapshot.exists()) {
      mlPrices = snapshot.val();
    } else {
      mlPrices = DEFAULT_ML_PRICES;
      db.ref('prices/mobile_legend').set(DEFAULT_ML_PRICES);
    }
    renderUI();
  });
  
  if (currentUser) {
    const userId = currentUser.id || currentUser.phone;
    db.ref('users/' + userId).on('value', (snapshot) => {
      if (snapshot.exists()) {
        const updatedUser = snapshot.val();
        currentUser = { ...currentUser, ...updatedUser };
        localStorage.setItem('diaZoneUser', JSON.stringify(currentUser));
        sessionStorage.setItem('diaZoneUser', JSON.stringify(currentUser));
      }
    });
  }
}

// --- Event Listeners ---
document.getElementById('backBtn').onclick = () => window.location.href = 'games.html';
document.getElementById('cancelOrderBtn').onclick = closeOrderModal;
document.getElementById('confirmOrderBtn').onclick = placeOrder;

document.querySelectorAll('.nav-item').forEach(item => {
  item.onclick = () => {
    const page = item.dataset.page;
    if (page === 'home') window.location.href = 'dashboard.html';
    else if (page === 'games') window.location.href = 'games.html';
    else if (page === 'wallet') window.location.href = 'wallet.html';
    else if (page === 'orders') window.location.href = 'orders.html';
    else if (page === 'profile') window.location.href = 'profile.html';
  };
});

window.onclick = (e) => {
  const modal = document.getElementById('orderModal');
  if (e.target === modal) closeOrderModal();
};

if (loadUserData()) {
  initFirebaseListeners();
}
</script> <
/body> <
/html>
