<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Register</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg-body: linear-gradient(145deg, #eef2f9 0%, #e2e8f0 100%);
      --bg-card: white;
      --text-primary: #0f172a;
      --text-secondary: #1e293b;
      --border-color: #e2edf2;
      --input-bg: #ffffff;
      --input-border: #e2edf2;
      --btn-bg: #0f172a;
      --btn-hover: #1f2a44;
      --error-bg: #fee2e2;
      --error-text: #b91c1c;
      --success-bg: #dcfce7;
      --success-text: #166534;
      --captcha-bg: #f3f4f6;
    }
    body.dark {
      --bg-body: linear-gradient(145deg, #0f172a 0%, #1e1b2e 100%);
      --bg-card: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --border-color: #334155;
      --input-bg: #0f172a;
      --input-border: #475569;
      --btn-bg: #3b82f6;
      --btn-hover: #2563eb;
      --error-bg: #7f1d1d;
      --error-text: #fecaca;
      --success-bg: #065f46;
      --success-text: #a7f3d0;
      --captcha-bg: #334155;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s ease, color 0.2s ease, border-color 0.2s ease; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .register-card { max-width: 560px; width: 100%; background: var(--bg-card); border-radius: 2rem; box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2); padding: 2rem 2rem 2.2rem; }
    h2 { font-size: 1.8rem; font-weight: 700; color: var(--text-primary); margin-bottom: 1.5rem; }
    .input-row { margin-bottom: 1.2rem; }
    label { display: block; font-weight: 600; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.4rem; }
    input { width: 100%; padding: 0.85rem 1rem; border: 1.5px solid var(--input-border); border-radius: 1rem; font-size: 0.95rem; font-family: inherit; background: var(--input-bg); color: var(--text-primary); }
    input:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    .captcha-box { background: var(--captcha-bg); border-radius: 1rem; padding: 0.8rem 1rem; display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; border: 1px solid var(--border-color); margin: 1rem 0; }
    .checkbox-mock { width: 1.2rem; height: 1.2rem; border: 2px solid #6b7280; border-radius: 0.25rem; background: white; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .checkbox-mock.checked { background: #3b82f6; border-color: #3b82f6; }
    .checkbox-mock.checked::after { content: "✓"; color: white; font-size: 0.8rem; font-weight: bold; }
    .captcha-text { font-size: 0.85rem; font-weight: 500; color: var(--text-primary); }
    .recaptcha-badge { margin-left: auto; font-size: 0.7rem; background: #eef2ff; padding: 0.2rem 0.6rem; border-radius: 30px; color: #1e40af; }
    body.dark .recaptcha-badge { background: #1e40af; color: white; }
    .btn-register { width: 100%; background: var(--btn-bg); color: white; font-weight: 700; padding: 0.9rem; border: none; border-radius: 2rem; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; font-family: inherit; transition: 0.2s; }
    .btn-register:hover { background: var(--btn-hover); transform: scale(0.98); }
    .btn-register:disabled { opacity: 0.7; cursor: not-allowed; }
    .login-redirect { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary); }
    .login-redirect a { color: #2563eb; font-weight: 600; text-decoration: none; cursor: pointer; }
    hr { margin: 1rem 0; border-color: var(--border-color); }
    .form-error { background: var(--error-bg); border-radius: 0.8rem; padding: 0.6rem; margin-top: 0.8rem; font-size: 0.8rem; color: var(--error-text); display: none; }
    .form-error.show { display: block; }
    .success-text { background: var(--success-bg); color: var(--success-text); padding: 0.6rem; border-radius: 0.8rem; display: none; margin-top: 1rem; }
    .success-text.show { display: block; }
    small { display: block; text-align: center; margin-top: 1rem; color: var(--text-secondary); font-size: 0.7rem; }
  </style>
  <script>
    function loadTheme() { const savedTheme = localStorage.getItem('diaZoneTheme'); if (savedTheme === 'dark') { document.body.classList.add('dark'); } }
    loadTheme();
    if (window.Telegram && window.Telegram.WebApp) { const tg = window.Telegram.WebApp; tg.expand(); tg.ready(); }
  </script>
</head>
<body>
<div class="register-card">
  <h2>Register Account</h2>
  <form id="registerForm">
    <div class="input-row"><label>Name *</label><input type="text" id="fullName" placeholder="Full name" autocomplete="off"></div>
    <div class="input-row"><label>Phone *</label><input type="tel" id="phone" placeholder="Phone number"></div>
    <div class="input-row"><label>Email (Optional)</label><input type="email" id="email" placeholder="Email address"></div>
    <div class="input-row"><label>Password *</label><input type="password" id="regPassword" placeholder="Create password"></div>
    <div class="input-row"><label>Retype Password *</label><input type="password" id="confirmPassword" placeholder="Confirm password"></div>
    <div class="captcha-box"><div class="checkbox-mock" id="recaptchaCheckbox"></div><span class="captcha-text">I'm not a robot</span><span class="recaptcha-badge">reCAPTCHA</span></div>
    <button type="submit" class="btn-register" id="registerBtn">Register</button>
  </form>
  <div id="registerFormError" class="form-error"></div>
  <div id="registerSuccessMsg" class="success-text"></div>
  <div class="login-redirect">Already have an account? <a id="gotoLogin">Login</a></div>
  <hr><small>Dia Zone • Secure registration</small>
</div>

<script>
  // --- Firebase Configuration ---
  const firebaseConfig = {
    apiKey: "AIzaSyB8iE6D3N7X7qZxR9kLmNpQrStUvWxYz123456",
    authDomain: "dia-zone.firebaseapp.com",
    databaseURL: "https://dia-zone-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dia-zone",
    storageBucket: "dia-zone.appspot.com",
    messagingSenderId: "123456789012",
    appId: "1:123456789012:web:abc123def456ghi789"
  };

  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const db = firebase.database();

  const recaptchaBox = document.getElementById('recaptchaCheckbox');
  let isCaptchaVerified = false;
  
  recaptchaBox.addEventListener('click', () => {
    if (recaptchaBox.classList.contains('checked')) {
      recaptchaBox.classList.remove('checked');
      isCaptchaVerified = false;
    } else {
      recaptchaBox.classList.add('checked');
      isCaptchaVerified = true;
    }
  });

  const registerForm = document.getElementById('registerForm');
  const formErrorDiv = document.getElementById('registerFormError');
  const successDiv = document.getElementById('registerSuccessMsg');
  const registerBtn = document.getElementById('registerBtn');

  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    formErrorDiv.classList.remove('show');
    successDiv.classList.remove('show');
    formErrorDiv.innerHTML = '';

    const name = document.getElementById('fullName').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const email = document.getElementById('email').value.trim();
    const pwd = document.getElementById('regPassword').value;
    const confirmPwd = document.getElementById('confirmPassword').value;

    if (!name || !phone || !pwd || !confirmPwd) {
      showRegisterError('Please fill in all required fields');
      return;
    }
    
    if (pwd !== confirmPwd) {
      showRegisterError('Passwords do not match');
      return;
    }
    
    if (pwd.length < 4) {
      showRegisterError('Password must be at least 4 characters');
      return;
    }
    
    if (!isCaptchaVerified) {
      showRegisterError('Please verify that you are not a robot');
      return;
    }
    
    const phoneRegex = /^[0-9\-\+\s]{9,15}$/;
    if (!phoneRegex.test(phone.replace(/\s/g, ''))) {
      showRegisterError('Invalid phone number format');
      return;
    }

    registerBtn.disabled = true;
    registerBtn.innerText = 'Registering...';

    try {
      // Check if phone already exists
      const snapshot = await db.ref('users').once('value');
      let phoneExists = false;
      
      snapshot.forEach((child) => {
        if (child.val().phone === phone) {
          phoneExists = true;
        }
      });
      
      if (phoneExists) {
        showRegisterError('Phone number already registered!');
        registerBtn.disabled = false;
        registerBtn.innerText = 'Register';
        return;
      }
      
      // Create new user
      const newUserRef = db.ref('users').push();
      const userData = {
        name: name,
        phone: phone,
        email: email || `${phone}@user.com`,
        password: pwd,
        balance: 0,
        memberSince: new Date().getFullYear().toString(),
        status: 'Verified',  // Changed from 'Pending Verification' to 'Verified'
        registerDate: new Date().toISOString()
      };
      
      await newUserRef.set(userData);
      
      // Save to localStorage for auto-login
      userData.id = newUserRef.key;
      userData.userId = newUserRef.key;
      localStorage.setItem('diaZoneUser', JSON.stringify(userData));
      sessionStorage.setItem('diaZoneUser', JSON.stringify(userData));
      
      successDiv.innerHTML = 'Registration successful! Redirecting to dashboard...';
      successDiv.classList.add('show');
      
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 2000);
      
    } catch (error) {
      console.error('Registration error:', error);
      showRegisterError('Connection error. Please try again.');
      registerBtn.disabled = false;
      registerBtn.innerText = 'Register';
    }
  });

  function showRegisterError(msg) {
    formErrorDiv.innerHTML = msg;
    formErrorDiv.classList.add('show');
    successDiv.classList.remove('show');
  }

  document.getElementById('gotoLogin').addEventListener('click', (e) => {
    e.preventDefault();
    window.location.href = 'login.html';
  });
</script>
</body>
</html>
