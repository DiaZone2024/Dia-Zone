<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Register - Dia Zone (Email OTP)</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

  <!-- EmailJS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg-body: linear-gradient(145deg, #eef2f9 0%, #e2e8f0 100%);
      --bg-card: white;
      --text-primary: #0f172a;
      --text-secondary: #1e293b;
      --border-color: #e2edf2;
      --input-bg: #ffffff;
      --input-border: #e2edf2;
      --btn-bg: #0f172a;
      --btn-hover: #1f2a44;
      --error-bg: #fee2e2;
      --error-text: #b91c1c;
      --success-bg: #dcfce7;
      --success-text: #166534;
      --info-bg: #e0f2fe;
      --info-text: #0369a1;
    }
    body.dark {
      --bg-body: linear-gradient(145deg, #0f172a 0%, #1e1b2e 100%);
      --bg-card: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --border-color: #334155;
      --input-bg: #0f172a;
      --input-border: #475569;
      --btn-bg: #3b82f6;
      --btn-hover: #2563eb;
      --error-bg: #7f1d1d;
      --error-text: #fecaca;
      --success-bg: #065f46;
      --success-text: #a7f3d0;
      --info-bg: #082f49;
      --info-text: #7dd3fc;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s ease, color 0.2s ease, border-color 0.2s ease; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .register-card { max-width: 560px; width: 100%; background: var(--bg-card); border-radius: 2rem; box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2); padding: 2rem 2rem 2.2rem; }
    h2 { font-size: 1.8rem; font-weight: 700; color: var(--text-primary); margin-bottom: 1.5rem; }
    .input-row { margin-bottom: 1.2rem; }
    label { display: block; font-weight: 600; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.4rem; }
    label .required { color: #ef4444; }
    input { width: 100%; padding: 0.85rem 1rem; border: 1.5px solid var(--input-border); border-radius: 1rem; font-size: 0.95rem; font-family: inherit; background: var(--input-bg); color: var(--text-primary); }
    input:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    .otp-group { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; }
    .otp-group input { flex: 2; margin-bottom: 0; }
    .otp-group button { padding: 0.85rem 1.2rem; border-radius: 1rem; border: none; font-weight: 600; cursor: pointer; background: #3b82f6; color: white; white-space: nowrap; }
    .otp-group button:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-register { width: 100%; background: var(--btn-bg); color: white; font-weight: 700; padding: 0.9rem; border: none; border-radius: 2rem; font-size: 1rem; cursor: pointer; margin-top: 1rem; font-family: inherit; transition: 0.2s; }
    .btn-register:hover { background: var(--btn-hover); transform: scale(0.98); }
    .btn-register:disabled { opacity: 0.7; cursor: not-allowed; }
    .login-redirect { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary); }
    .login-redirect a { color: #2563eb; font-weight: 600; text-decoration: none; cursor: pointer; }
    hr { margin: 1rem 0; border-color: var(--border-color); }
    .form-error { background: var(--error-bg); border-radius: 0.8rem; padding: 0.6rem; margin-top: 0.8rem; font-size: 0.8rem; color: var(--error-text); display: none; }
    .form-error.show { display: block; }
    .success-text { background: var(--success-bg); color: var(--success-text); padding: 0.6rem; border-radius: 0.8rem; display: none; margin-top: 1rem; }
    .success-text.show { display: block; }
    .info-text { background: var(--info-bg); color: var(--info-text); padding: 0.6rem; border-radius: 0.8rem; margin-top: 1rem; font-size: 0.8rem; text-align: center; display: none; }
    .info-text.show { display: block; }
    small { display: block; text-align: center; margin-top: 1rem; color: var(--text-secondary); font-size: 0.7rem; }
    .resend-btn { background: none; border: none; color: #3b82f6; cursor: pointer; font-size: 0.8rem; margin-top: 0.5rem; text-decoration: underline; display: none; }
  </style>
  <script>
    function loadTheme() { const savedTheme = localStorage.getItem('diaZoneTheme'); if (savedTheme === 'dark') { document.body.classList.add('dark'); } }
    loadTheme();
    if (window.Telegram && window.Telegram.WebApp) { const tg = window.Telegram.WebApp; tg.expand(); tg.ready(); }
  </script>
</head>
<body>
<div class="register-card">
  <h2>Register Account</h2>
  <form id="registerForm">
    <div class="input-row">
      <label>Name <span class="required">*</span></label>
      <input type="text" id="fullName" placeholder="Full name" autocomplete="off">
    </div>
    <div class="input-row">
      <label>Phone <span class="required">*</span></label>
      <input type="tel" id="phone" placeholder="Phone number">
    </div>
    <div class="input-row">
      <label>Email <span class="required">*</span></label>
      <input type="email" id="email" placeholder="your@email.com">
    </div>
    <div class="input-row">
      <label>Password <span class="required">*</span></label>
      <input type="password" id="regPassword" placeholder="Create password (min 6 characters)">
    </div>
    <div class="input-row">
      <label>Retype Password <span class="required">*</span></label>
      <input type="password" id="confirmPassword" placeholder="Confirm password">
    </div>
    
    <div class="input-row">
      <label>Email Verification <span class="required">*</span></label>
      <div class="otp-group">
        <input type="text" id="otpCode" placeholder="Enter 6-digit OTP code" maxlength="6" autocomplete="off" disabled>
        <button type="button" id="sendOtpBtn">Send OTP</button>
      </div>
      <div id="otpStatus" class="info-text"></div>
      <button type="button" id="resendOtpBtn" class="resend-btn">Resend OTP</button>
    </div>
    
    <button type="submit" class="btn-register" id="registerBtn" disabled>Register</button>
  </form>
  <div id="registerFormError" class="form-error"></div>
  <div id="registerSuccessMsg" class="success-text"></div>
  <div class="login-redirect">Already have an account? <a id="gotoLogin">Login</a></div>
  <hr><small>Dia Zone • Email OTP Verification</small>
</div>

<script>
  // ============ FIREBASE CONFIGURATION (UPDATED) ============
  const firebaseConfig = {
    apiKey: "AIzaSyCZridqu0bhTRM5mzbRdfJxWic4xcG7rg4",
    authDomain: "dia-zone.firebaseapp.com",
    databaseURL: "https://dia-zone-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dia-zone",
    storageBucket: "dia-zone.firebasestorage.app",
    messagingSenderId: "954378673786",
    appId: "1:954378673786:web:fe6ab648f60eb5207665c3",
    measurementId: "G-CFZG0R60XN"
  };

  // Initialize Firebase
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
    console.log("✅ Firebase initialized with correct API key");
  }
  const auth = firebase.auth();
  const db = firebase.database();

  // ============ EMAILJS CONFIGURATION ============
  if (typeof emailjs !== 'undefined') {
    emailjs.init("w6UmVAyBh9bh_1H4R");
    console.log("✅ EmailJS initialized successfully");
  } else {
    console.error("❌ EmailJS not loaded! Please check your internet connection.");
  }

  // ============ EMAIL OTP SYSTEM ============
  let currentEmail = '';
  let isOtpVerified = false;

  const sendOtpBtn = document.getElementById('sendOtpBtn');
  const resendOtpBtn = document.getElementById('resendOtpBtn');
  const otpCodeInput = document.getElementById('otpCode');
  const otpStatus = document.getElementById('otpStatus');
  const registerBtn = document.getElementById('registerBtn');
  const emailInput = document.getElementById('email');
  const fullNameInput = document.getElementById('fullName');

  function generateOTP() {
    return Math.floor(100000 + Math.random() * 900000).toString();
  }

  async function sendOTPToEmail(email, userName) {
    const otp = generateOTP();
    const otpData = {
      code: otp,
      email: email,
      expiry: Date.now() + 5 * 60 * 1000
    };
    sessionStorage.setItem('emailOTP', JSON.stringify(otpData));
    
    if (typeof emailjs === 'undefined') {
      console.error("EmailJS not available");
      return false;
    }
    
    try {
      const result = await emailjs.send(
        'service_taubudq',
        'template_agnknih',
        {
          to_email: email,
          otp_code: otp,
          user_name: userName || 'User'
        }
      );
      console.log('✅ Email sent:', result);
      return true;
    } catch(error) {
      console.error('❌ EmailJS error:', error);
      return false;
    }
  }

  sendOtpBtn.addEventListener('click', async () => {
    const email = emailInput.value.trim();
    const userName = fullNameInput.value.trim() || 'User';
    
    if (!email) {
      otpStatus.textContent = 'Please enter your email address first';
      otpStatus.classList.add('show');
      setTimeout(() => otpStatus.classList.remove('show'), 3000);
      return;
    }
    
    const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
    if (!emailRegex.test(email)) {
      otpStatus.textContent = 'Please enter a valid email address';
      otpStatus.classList.add('show');
      setTimeout(() => otpStatus.classList.remove('show'), 3000);
      return;
    }
    
    currentEmail = email;
    sendOtpBtn.disabled = true;
    sendOtpBtn.textContent = 'Sending...';
    otpStatus.textContent = 'Sending OTP...';
    otpStatus.classList.add('show');
    
    const success = await sendOTPToEmail(email, userName);
    
    if (success) {
      otpStatus.textContent = '✓ OTP sent! Check your email (Valid 5 min)';
      otpStatus.style.background = '#10b981';
      otpStatus.style.color = 'white';
      resendOtpBtn.style.display = 'inline-block';
      otpCodeInput.disabled = false;
      otpCodeInput.focus();
    } else {
      otpStatus.textContent = '✗ Failed to send OTP. Try again.';
      otpStatus.style.background = '#ef4444';
      otpStatus.style.color = 'white';
    }
    
    setTimeout(() => {
      otpStatus.classList.remove('show');
      otpStatus.style.background = '';
      otpStatus.style.color = '';
    }, 5000);
    
    sendOtpBtn.disabled = false;
    sendOtpBtn.textContent = 'Send OTP';
  });
  
  resendOtpBtn.addEventListener('click', async () => {
    if (!currentEmail) { alert('Enter email first'); return; }
    const userName = fullNameInput.value.trim() || 'User';
    sendOtpBtn.click();
  });
  
  otpCodeInput.addEventListener('input', () => {
    const enteredCode = otpCodeInput.value.trim();
    const storedData = sessionStorage.getItem('emailOTP');
    
    if (storedData && enteredCode.length === 6) {
      const otpData = JSON.parse(storedData);
      if (Date.now() > otpData.expiry) {
        otpStatus.textContent = 'OTP expired. Request new one.';
        otpStatus.classList.add('show');
        otpCodeInput.value = '';
        isOtpVerified = false;
        registerBtn.disabled = true;
        setTimeout(() => otpStatus.classList.remove('show'), 3000);
        return;
      }
      
      if (enteredCode === otpData.code && otpData.email === currentEmail) {
        isOtpVerified = true;
        registerBtn.disabled = false;
        otpStatus.textContent = '✓ Email verified!';
        otpStatus.style.background = '#10b981';
        otpStatus.style.color = 'white';
        otpStatus.classList.add('show');
        setTimeout(() => otpStatus.classList.remove('show'), 3000);
      } else {
        isOtpVerified = false;
        registerBtn.disabled = true;
        if (enteredCode.length === 6) {
          otpStatus.textContent = 'Invalid OTP code';
          otpStatus.classList.add('show');
          setTimeout(() => otpStatus.classList.remove('show'), 2000);
        }
      }
    }
  });

  // ============ REGISTRATION ============
  const registerForm = document.getElementById('registerForm');
  const formErrorDiv = document.getElementById('registerFormError');
  const successDiv = document.getElementById('registerSuccessMsg');

  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    formErrorDiv.classList.remove('show');
    successDiv.classList.remove('show');
    
    const name = document.getElementById('fullName').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const email = emailInput.value.trim();
    const pwd = document.getElementById('regPassword').value;
    const confirmPwd = document.getElementById('confirmPassword').value;
    
    if (!name || !phone || !email || !pwd || !confirmPwd) {
      showRegisterError('Please fill in all required fields');
      return;
    }
    if (pwd !== confirmPwd) { showRegisterError('Passwords do not match'); return; }
    if (pwd.length < 6) { showRegisterError('Password must be at least 6 characters'); return; }
    if (!/^[0-9\-\+\s]{9,15}$/.test(phone.replace(/\s/g, ''))) { showRegisterError('Invalid phone number'); return; }
    if (!isOtpVerified) { showRegisterError('Please verify your email with OTP first'); return; }
    
    registerBtn.disabled = true;
    registerBtn.innerText = 'Registering...';
    
    try {
      const signInMethods = await auth.fetchSignInMethodsForEmail(email);
      if (signInMethods.length > 0) { showRegisterError('Email already registered!'); registerBtn.disabled = false; registerBtn.innerText = 'Register'; return; }
      
      const snapshot = await db.ref('users').once('value');
      let phoneExists = false;
      snapshot.forEach(child => { if (child.val().phone === phone) phoneExists = true; });
      if (phoneExists) { showRegisterError('Phone number already registered!'); registerBtn.disabled = false; registerBtn.innerText = 'Register'; return; }
      
      const userCredential = await auth.createUserWithEmailAndPassword(email, pwd);
      const firebaseUser = userCredential.user;
      
      await db.ref('users/' + firebaseUser.uid).set({
        name, phone, email, password: pwd, balance: 0,
        memberSince: new Date().getFullYear().toString(),
        status: 'Verified', emailVerified: true,
        registerDate: new Date().toISOString(), authUid: firebaseUser.uid
      });
      
      sessionStorage.removeItem('emailOTP');
      const userData = { id: firebaseUser.uid, userId: firebaseUser.uid, name, phone, email, balance: 0 };
      localStorage.setItem('diaZoneUser', JSON.stringify(userData));
      sessionStorage.setItem('diaZoneUser', JSON.stringify(userData));
      
      successDiv.innerHTML = 'Registration successful! Redirecting...';
      successDiv.classList.add('show');
      setTimeout(() => window.location.href = 'dashboard.html', 2000);
      
    } catch (error) {
      console.error('Registration error:', error);
      let errorMsg = 'Connection error. Please try again.';
      if (error.code === 'auth/email-already-in-use') errorMsg = 'Email already registered!';
      else if (error.code === 'auth/invalid-email') errorMsg = 'Invalid email format!';
      else if (error.code === 'auth/weak-password') errorMsg = 'Password too weak (min 6 characters)';
      showRegisterError(errorMsg);
      registerBtn.disabled = false;
      registerBtn.innerText = 'Register';
    }
  });

  function showRegisterError(msg) {
    formErrorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${msg}`;
    formErrorDiv.classList.add('show');
    successDiv.classList.remove('show');
  }

  document.getElementById('gotoLogin').addEventListener('click', (e) => {
    e.preventDefault();
    window.location.href = 'login.html';
  });
</script>
</body>
</html>
