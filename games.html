<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Dia Zone - Games</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0b0c1a 0%, #11132a 100%);
      font-family: 'Inter', 'Poppins', 'Myanmar Text', sans-serif;
      min-height: 100vh;
      padding: 1rem;
      padding-bottom: 85px;
    }

    .games-container {
      max-width: 550px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 1.8rem;
      padding-top: 0.5rem;
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(120deg, #FFF8E7, #FFE6A3);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .header h1 i {
      background: none;
      -webkit-background-clip: unset;
      background-clip: unset;
      color: #FFC857;
      margin-right: 10px;
    }

    /* Game Grid */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    .game-card {
      position: relative;
      border-radius: 1.2rem;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      aspect-ratio: 1 / 0.9;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 215, 0, 0.2);
    }

    .game-card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.4);
      border-color: rgba(255, 215, 0, 0.5);
    }

    /* Game Background Images */
    .game-card.ml-bg {
      background: linear-gradient(0deg, rgba(0,0,0,0.75), rgba(0,0,0,0.4)), 
                  url('image/mlbb.jpg');
      background-size: cover;
      background-position: center;
    }

    .game-card.pubg-bg {
      background: linear-gradient(0deg, rgba(0,0,0,0.75), rgba(0,0,0,0.4)), 
                  url('image/pubg.jpg');
      background-size: cover;
      background-position: center;
    }

    .game-card.genshin-bg {
      background: linear-gradient(0deg, rgba(0,0,0,0.75), rgba(0,0,0,0.4)), 
                  url('image/Genshin.jpg');
      background-size: cover;
      background-position: center;
    }

    .game-card.ff-bg {
      background: linear-gradient(0deg, rgba(0,0,0,0.75), rgba(0,0,0,0.4)), 
                  url('image/FreeFire.jpg');
      background-size: cover;
      background-position: center;
    }

    .game-card-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1rem;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      text-align: center;
    }

    .game-name {
      font-size: 1rem;
      font-weight: 700;
      color: #FFE6A3;
      margin-bottom: 0.5rem;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }

    .buy-btn {
      background: linear-gradient(95deg, #FFC857, #FFAE2B);
      color: #12142e;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
    }

    .buy-btn:hover {
      background: linear-gradient(95deg, #FFD46E, #FFB83B);
      transform: scale(0.98);
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10, 12, 28, 0.95);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0.6rem 1rem;
      border-top: 1px solid rgba(255, 215, 0, 0.2);
      max-width: 550px;
      margin: 0 auto;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 1.2rem;
      transition: all 0.2s;
      font-family: inherit;
    }

    .nav-icon {
      font-size: 1.4rem;
    }

    .nav-label {
      font-size: 0.7rem;
      font-weight: 500;
      color: #a3abdf;
      letter-spacing: 0.3px;
    }

    .nav-item.active .nav-label {
      color: #FFD966;
      font-weight: 600;
    }

    .nav-item.active .nav-icon {
      color: #FFD966;
    }

    .nav-item:hover {
      background: rgba(255, 215, 0, 0.08);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

<div class="games-container">
  <div class="header">
    <h1><i class="fas fa-gamepad"></i>ဂိမ်းများ</h1>
  </div>

  <div class="game-grid" id="gameGrid"></div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <button class="nav-item" data-page="home">
    <div class="nav-icon">🏠</div>
    <div class="nav-label">ပင်မစာမျက်နှာ</div>
  </button>
  <button class="nav-item active" data-page="games">
    <div class="nav-icon">🎮</div>
    <div class="nav-label">ဂိမ်းစာမျက်နှာ</div>
  </button>
  <button class="nav-item" data-page="wallet">
    <div class="nav-icon">👛</div>
    <div class="nav-label">ပိုက်ဆံအိတ်</div>
  </button>
  <button class="nav-item" data-page="orders">
    <div class="nav-icon">📦</div>
    <div class="nav-label">မှတ်တမ်းများ</div>
  </button>
  <button class="nav-item" data-page="profile">
    <div class="nav-icon">👤</div>
    <div class="nav-label">ပရိုဖိုင်</div>
  </button>
</div>

<script>
  // Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyCZridqu0bhTRM5mzbRdfJxWic4xcG7rg4",
  authDomain: "dia-zone.firebaseapp.com",
  databaseURL: "https://dia-zone-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dia-zone",
  storageBucket: "dia-zone.firebasestorage.app",
  messagingSenderId: "954378673786",
  appId: "1:954378673786:web:fe6ab648f60eb5207665c3"
};

  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Games with background classes
  const GAMES = [
    { name: "Mobile Legend", bgClass: "ml-bg", link: "ml-diamonds.html" },
    { name: "Pubg", bgClass: "pubg-bg", link: "pubg-uc.html" },
    { name: "Genshin Impact", bgClass: "genshin-bg", link: null },
    { name: "Free Fire", bgClass: "ff-bg", link: null }
  ];

  function renderGames() {
    const grid = document.getElementById('gameGrid');
    grid.innerHTML = '';
    GAMES.forEach(game => {
      const card = document.createElement('div');
      card.className = `game-card ${game.bgClass}`;
      card.innerHTML = `
        <div class="game-card-overlay">
          <div class="game-name">${game.name}</div>
          <button class="buy-btn">Buy Now</button>
        </div>
      `;
      card.onclick = (e) => {
        if (e.target.classList.contains('buy-btn')) e.stopPropagation();
        if (game.link) {
          window.location.href = game.link;
        } else {
          alert(game.name + " coming soon!");
        }
      };
      grid.appendChild(card);
    });
  }
  renderGames();

  // Navigation
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      const page = item.dataset.page;
      if (page === 'home') window.location.href = 'dashboard.html';
      else if (page === 'games') window.location.href = 'games.html';
      else if (page === 'wallet') window.location.href = 'wallet.html';
      else if (page === 'orders') window.location.href = 'orders.html';
      else if (page === 'profile') window.location.href = 'profile.html';
    });
  });
</script>
</body>
</html>
