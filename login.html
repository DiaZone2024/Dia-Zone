<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Login - Dia Zone</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg-body: linear-gradient(135deg, #f5f7fc 0%, #e9eef5 100%);
      --bg-card: white;
      --text-primary: #0a2540;
      --text-secondary: #334155;
      --border-color: #e2e8f0;
      --input-bg: #fefefe;
      --input-border: #e2e8f0;
      --btn-bg: #0f172a;
      --btn-hover: #1e293b;
      --error-bg: #fee2e2;
      --error-text: #b91c1c;
    }
    body.dark {
      --bg-body: linear-gradient(135deg, #0f172a 0%, #1e1b2e 100%);
      --bg-card: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --border-color: #334155;
      --input-bg: #0f172a;
      --input-border: #475569;
      --btn-bg: #3b82f6;
      --btn-hover: #2563eb;
      --error-bg: #7f1d1d;
      --error-text: #fecaca;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s ease, color 0.2s ease, border-color 0.2s ease; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .login-card { max-width: 520px; width: 100%; background: var(--bg-card); border-radius: 2rem; box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15); padding: 2rem 2rem 2.5rem; }
    h1 { font-size: 1.9rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.5rem; }
    .input-group { margin-bottom: 1.25rem; }
    label { display: block; font-weight: 600; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.4rem; }
    input { width: 100%; padding: 0.85rem 1rem; border: 1.5px solid var(--input-border); border-radius: 1rem; font-size: 0.95rem; font-family: inherit; background: var(--input-bg); color: var(--text-primary); }
    input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
    .btn-primary { width: 100%; background: var(--btn-bg); color: white; font-weight: 700; padding: 0.85rem; border: none; border-radius: 2rem; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; font-family: inherit; transition: 0.2s; }
    .btn-primary:hover { background: var(--btn-hover); transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
    .register-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary); }
    .register-link a { color: #3b82f6; font-weight: 600; text-decoration: none; cursor: pointer; }
    hr { margin: 1.5rem 0; border-color: var(--border-color); }
    .error-box { background: var(--error-bg); border-radius: 1rem; padding: 0.8rem 1rem; margin-top: 1rem; font-size: 0.85rem; color: var(--error-text); display: none; }
    .error-box.show { display: block; }
    small { display: block; margin-top: 1rem; text-align: center; color: var(--text-secondary); font-size: 0.7rem; }
  </style>
  <script>
    function loadTheme() { const savedTheme = localStorage.getItem('diaZoneTheme'); if (savedTheme === 'dark') { document.body.classList.add('dark'); } }
    loadTheme();
    if (window.Telegram && window.Telegram.WebApp) { const tg = window.Telegram.WebApp; tg.expand(); tg.ready(); }
  </script>
</head>
<body>
<div class="login-card">
  <h1>Dia Zone</h1>
  <form id="loginForm">
    <div class="input-group"><label>Email</label><input type="email" id="email" placeholder="your@email.com" autocomplete="off"></div>
    <div class="input-group"><label>Password</label><input type="password" id="password" placeholder="Password"></div>
    <button type="submit" class="btn-primary" id="loginBtn">Login</button>
  </form>
  <div class="register-link">Don't have an account? <a href="#" id="registerRedirect">Register</a></div>
  <hr>
  <div id="errorMessage" class="error-box"></div>
  <small>Dia Zone • Secure Account</small>
</div>

<script>
  // ============ FIREBASE CONFIGURATION (SAME AS REGISTER PAGE) ============
  const firebaseConfig = {
    apiKey: "AIzaSyCZridqu0bhTRM5mzbRdfJxWic4xcG7rg4",
    authDomain: "dia-zone.firebaseapp.com",
    databaseURL: "https://dia-zone-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dia-zone",
    storageBucket: "dia-zone.firebasestorage.app",
    messagingSenderId: "954378673786",
    appId: "1:954378673786:web:fe6ab648f60eb5207665c3",
    measurementId: "G-CFZG0R60XN"
  };

  // Initialize Firebase
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
    console.log("✅ Firebase initialized");
  }
  const auth = firebase.auth();
  const db = firebase.database();

  const loginForm = document.getElementById('loginForm');
  const errorDiv = document.getElementById('errorMessage');
  const loginBtn = document.getElementById('loginBtn');

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    errorDiv.classList.remove('show');
    
    if (!email || !password) {
      showError('Please enter both email and password');
      return;
    }

    loginBtn.disabled = true;
    loginBtn.innerText = 'Logging in...';

    try {
      // 1. Sign in with Firebase Authentication
      const userCredential = await auth.signInWithEmailAndPassword(email, password);
      const user = userCredential.user;
      
      console.log("✅ Firebase Auth success. UID:", user.uid);
      
      // 2. Get user data from Realtime Database
      const snapshot = await db.ref('users/' + user.uid).once('value');
      
      if (!snapshot.exists()) {
        console.error("❌ User data not found in database");
        showError('User data not found. Please contact support.');
        await auth.signOut();
        return;
      }
      
      const userData = snapshot.val();
      console.log("✅ User data loaded:", userData.name);
      
      // 3. Check if user is suspended
      if (userData.status === 'Suspended') {
        showError('Your account has been suspended. Please contact admin.');
        await auth.signOut();
        return;
      }
      
      // 4. Save to localStorage
      userData.id = user.uid;
      userData.userId = user.uid;
      localStorage.setItem('diaZoneUser', JSON.stringify(userData));
      sessionStorage.setItem('diaZoneUser', JSON.stringify(userData));
      
      console.log("✅ Login successful, redirecting to dashboard");
      window.location.href = 'dashboard.html';
      
    } catch (error) {
      console.error('❌ Login error:', error);
      let errorMsg = 'Invalid email or password';
      if (error.code === 'auth/user-not-found') {
        errorMsg = 'No account found with this email. Please register first.';
      } else if (error.code === 'auth/wrong-password') {
        errorMsg = 'Incorrect password. Please try again.';
      } else if (error.code === 'auth/invalid-email') {
        errorMsg = 'Invalid email format.';
      } else if (error.code === 'auth/too-many-requests') {
        errorMsg = 'Too many failed attempts. Please try again later.';
      }
      showError(errorMsg);
      loginBtn.disabled = false;
      loginBtn.innerText = 'Login';
    }
  });

  function showError(msg) {
    errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${msg}`;
    errorDiv.classList.add('show');
    setTimeout(() => {
      loginBtn.disabled = false;
      loginBtn.innerText = 'Login';
    }, 3000);
  }

  document.getElementById('registerRedirect').addEventListener('click', (e) => {
    e.preventDefault();
    window.location.href = 'register.html';
  });
</script>
</body>
</html>
